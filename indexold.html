let clipboard = null; // { notes, stems, beams, flags, barlines, clefs, rests, hairpins, keySigs, ties, strokes }

document.getElementById('copyBtn').addEventListener('click', () => {
  // Collect selected items — from sel or selSet
  const selIds = selSet.length ? selSet : sel ? [{type:sel.type, id:sel.id}] : [];
  if(!selIds.length) return;

  const noteIds   = new Set(selIds.filter(s=>s.type==='note').map(s=>s.id));
  const stemIds   = new Set(selIds.filter(s=>s.type==='stem'||s.type==='stemTip').map(s=>s.id));
  const blIds     = new Set(selIds.filter(s=>s.type==='barline'||s.type==='barlineEnd').map(s=>s.id));
  const clefIds   = new Set(selIds.filter(s=>s.type==='clef').map(s=>s.id));
  const restIds   = new Set(selIds.filter(s=>s.type==='rest').map(s=>s.id));
  const hairpinIds= new Set(selIds.filter(s=>s.type==='hairpin'||s.type==='hairpinEnd').map(s=>s.id));
  const keySigIds = new Set(selIds.filter(s=>s.type==='keysig').map(s=>s.id));
  const tieIds    = new Set(selIds.filter(s=>s.type==='tie'||s.type==='tieEnd').map(s=>s.id));
  const tlIds     = new Set(selIds.filter(s=>s.type==='textLabel').map(s=>s.id));
  const strokeIs  = selIds.filter(s=>s.type==='stroke'||s.type==='strokeEnd').map(s=>s.id);

  // Also copy stems that belong to selected notes
  const noteStemIds = new Set(stems.filter(s=>noteIds.has(s.noteId)).map(s=>s.id));
  const allStemIds  = new Set([...stemIds, ...noteStemIds]);

  const copiedNotes    = notes.filter(n=>noteIds.has(n.id)).map(n=>({...n}));
  const copiedStems    = stems.filter(s=>allStemIds.has(s.id)).map(s=>({...s}));
  // Only copy beams where BOTH stem endpoints are in the selection (avoids dangling refs)
  const copiedBeams    = beams.filter(b=>allStemIds.has(b.stemId1)&&allStemIds.has(b.stemId2)).map(b=>({...b}));
  const copiedFlags    = flags.filter(f=>allStemIds.has(f.stemId)).map(f=>({...f}));
  const copiedBarlines = barlines.filter(b=>blIds.has(b.id)).map(b=>({...b}));
  const copiedClefs    = clefs.filter(c=>clefIds.has(c.id)).map(c=>({...c}));
  const copiedRests    = rests.filter(r=>restIds.has(r.id)).map(r=>({...r}));
  const copiedHairpins = hairpins.filter(h=>hairpinIds.has(h.id)).map(h=>({...h}));
  const copiedKeySigs  = keySigs.filter(k=>keySigIds.has(k.id)).map(k=>({...k}));
  // Only copy ties where BOTH endpoint notes are in the selection
  const copiedTextLabels = textLabels.filter(t=>tlIds.has(t.id)).map(t=>({...t, _w:undefined, _h:undefined}));
  const copiedTies     = ties.filter(t=>(tieIds.has(t.id)||
    (noteIds.has(t.noteId1)&&noteIds.has(t.noteId2)))).map(t=>({...t, _geo:undefined}));
  const allStrokes     = fd.getStrokes();
  const copiedStrokes  = strokeIs.map(i=>allStrokes[i]).filter(Boolean).map(s=>({...s, pts:s.pts.map(p=>({...p}))}));

  clipboard = { notes:copiedNotes, stems:copiedStems, beams:copiedBeams, flags:copiedFlags,
                barlines:copiedBarlines, clefs:copiedClefs, rests:copiedRests,
                hairpins:copiedHairpins, keySigs:copiedKeySigs, ties:copiedTies,
                textLabels:copiedTextLabels, strokes:copiedStrokes };
});

document.getElementById('pasteBtn').addEventListener('click', () => {
  if(!clipboard) return;
  historyPush();
  // Clear any existing selection before pasting so original and pasted groups don't mingle
  sel = null;
  selSet = [];

  // If user clicked empty space since copying, paste near that point.
  // Otherwise fall back to a fixed offset from the copied position.
  const clipMinX = clipboard.notes.length  ? Math.min(...clipboard.notes.map(n=>n.x))
                 : clipboard.stems.length   ? Math.min(...clipboard.stems.map(s=>s.x))
                 : clipboard.rests.length   ? Math.min(...clipboard.rests.map(r=>r.x))
                 : null;
  const off = (pasteAnchor !== null && clipMinX !== null)
    ? pasteAnchor.x - clipMinX
    : LS * 4;
  pasteAnchor = null; // consume anchor so next paste without a click uses fixed offset
  const scaleCss = fd.cssW / LW;

  // Build id remapping so pasted objects get fresh IDs
  const noteMap = new Map(), stemMap = new Map(), blMap = new Map(), clefMap = new Map();

  const newNotes = clipboard.notes.map(n => {
    const newId = nid++;
    noteMap.set(n.id, newId);
    return {...n, id:newId, x:clampX(n.x+off)};
  });
  const newStems = clipboard.stems.map(s => {
    const newId = sid++;
    stemMap.set(s.id, newId);
    const newNoteId = noteMap.has(s.noteId) ? noteMap.get(s.noteId) : s.noteId;
    return {...s, id:newId, noteId:newNoteId, x:clampX(s.x+off)};
  });
  // Drop beams where either stem wasn't remapped (shouldn't happen, but guards against stale clipboard)
  const newBeams = clipboard.beams
    .filter(b=>stemMap.has(b.stemId1)&&stemMap.has(b.stemId2))
    .map(b => ({...b, id:beamid++, stemId1:stemMap.get(b.stemId1), stemId2:stemMap.get(b.stemId2)}));
  const newFlags = clipboard.flags
    .filter(f=>stemMap.has(f.stemId))
    .map(f => ({...f, id:flagid++, stemId:stemMap.get(f.stemId)}));
  const newBarlines = clipboard.barlines.map(b => {
    const newId = blid++;
    blMap.set(b.id, newId);
    return {...b, id:newId, x:clampXWide(b.x+off)};
  });
  const newClefs = clipboard.clefs.map(c => {
    const newId = clid++;
    clefMap.set(c.id, newId);
    return {...c, id:newId, x:clampXWide(c.x+off)};
  });
  const newRests    = (clipboard.rests||[]).map(r => ({...r, id:rid++, x:clampX(r.x+off)}));
  const newHairpins = (clipboard.hairpins||[]).map(h => ({...h, id:hpid++, x1:clampXWide(h.x1+off), x2:clampXWide(h.x2+off)}));
  const newKeySigs  = (clipboard.keySigs||[]).map(k => ({...k, id:ksid++, x:clampXWide(k.x+off)}));
  // Ties: remap note IDs; drop ties whose notes weren't both copied
  const newTextLabels = (clipboard.textLabels||[]).map(t => ({...t, id:tlid++, x:clampXWide(t.x+off), y:t.y}));
  const newTies = (clipboard.ties||[])
    .filter(t=>noteMap.has(t.noteId1)&&noteMap.has(t.noteId2))
    .map(t => ({...t, id:tieid++, noteId1:noteMap.get(t.noteId1), noteId2:noteMap.get(t.noteId2)}));

  notes    = [...notes,    ...newNotes];
  stems    = [...stems,    ...newStems];
  beams    = [...beams,    ...newBeams];
  flags    = [...flags,    ...newFlags];
  barlines = [...barlines, ...newBarlines];
  clefs    = [...clefs,    ...newClefs];
  rests    = [...rests,    ...newRests];
  hairpins = [...hairpins, ...newHairpins];
  keySigs  = [...keySigs,  ...newKeySigs];
  ties     = [...ties,     ...newTies];
  textLabels = [...textLabels, ...newTextLabels];

  // Paste strokes offset in CSS px
  let pastedStrokeIndices = [];
  if(clipboard.strokes && clipboard.strokes.length){
    const all = fd.getStrokes();
    clipboard.strokes.forEach(s => {
      pastedStrokeIndices.push(all.length);
      all.push({...s, pts: s.pts.map(p=>({x:p.x+off*scaleCss, y:p.y}))});
    });
    fd.restoreStrokes(all);
  }

  // Select the pasted items
  sel = null;
  selSet = [
    ...newNotes.map(n=>({type:'note', id:n.id})),
    ...newStems.map(s=>({type:'stem', id:s.id})),
    ...newBarlines.map(b=>({type:'barline', id:b.id})),
    ...newClefs.map(c=>({type:'clef', id:c.id})),
    ...newRests.map(r=>({type:'rest', id:r.id})),
    ...newHairpins.map(h=>({type:'hairpin', id:h.id})),
    ...newKeySigs.map(k=>({type:'keysig', id:k.id})),
    ...newTies.map(t=>({type:'tie', id:t.id})),
    ...newTextLabels.map(t=>({type:'textLabel', id:t.id})),
    ...pastedStrokeIndices.map(i=>({type:'stroke', id:i})),
  ];

  render();
});

// ── Zoom (Ctrl+wheel / pinch) with inertia ───────────────────────────────
let _zoomVel  = 0;   // current velocity (zoom units per frame)
let _zoomRaf  = null;
let _zoomLast = 0;

function _zoomApply(){
  const sx = scrollArea.scrollLeft / (scrollArea.scrollWidth  - scrollArea.clientWidth  || 1);
  const sy = scrollArea.scrollTop  / (scrollArea.scrollHeight - scrollArea.clientHeight || 1);
  const oldZoom = zoomLevel;
  zoomLevel = Math.round(Math.max(ZOOM_MIN, Math.min(ZOOM_MAX,
    zoomLevel + _zoomVel)) * 1000) / 1000;
  _zoomVel *= 0.78;
  if(Math.abs(zoomLevel - oldZoom) > 0.0005){
    resize();
    _updateZoomPill();
    requestAnimationFrame(() => {
      scrollArea.scrollLeft = sx * (scrollArea.scrollWidth  - scrollArea.clientWidth);
      scrollArea.scrollTop  = sy * (scrollArea.scrollHeight - scrollArea.clientHeight);
    });
  }
  if(Math.abs(_zoomVel) > 0.0004){
    _zoomRaf = requestAnimationFrame(_zoomApply);
  } else {
    _zoomVel = 0; _zoomRaf = null;
  }
}

scrollArea.addEventListener('wheel', e => {
  if(!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const now = Date.now();
  if(now - _zoomLast < 50) return; // throttle to block inertia tail
  _zoomLast = now;
  const raw  = Math.abs(e.deltaY);
  const step = Math.min(ZOOM_STEP, raw * 0.018);
  const dir  = e.deltaY > 0 ? -1 : 1;
  // Add to velocity in same direction, replace on reversal
  _zoomVel = Math.sign(_zoomVel) === dir ? _zoomVel + dir * step * 0.5 : dir * step;
  if(!_zoomRaf) _zoomRaf = requestAnimationFrame(_zoomApply);
}, {passive:false});

// ── 2-finger gestures (touch) ────────────────────────────────────────
// Two-finger scrub REMOVED — two-finger gesture reserved for future pan/zoom.
// Use the dedicated scrub tool button instead.
let _panLastX = 0, _panLastY = 0, _panActive = false;
let _pinchLastDist = 0;

function touchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.hypot(dx, dy);
}

function touchCenter(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
  };
}

function onPanStart(e){
  if(e.touches.length !== 2) return;
  _panActive = true;
  const c = touchCenter(e);
  _panLastX = c.x;
  _panLastY = c.y;
  _pinchLastDist = touchDist(e);
}
function onPanMove(e){
  if(!_panActive || e.touches.length !== 2) return;
  e.preventDefault();
  const c = touchCenter(e);
  const dist = touchDist(e);

  // Pan — only vertical scroll in landscape orientation
  const isLandscape = window.matchMedia('(orientation:landscape)').matches;
  if(isLandscape){
    scrollArea.scrollTop  -= c.y - _panLastY;
  }
  _panLastX = c.x; _panLastY = c.y;

  // Pinch zoom (disabled for now — set to true to re-enable)
  const PINCH_ZOOM_ENABLED = false;
  if(PINCH_ZOOM_ENABLED && _pinchLastDist > 0) {
    const scale = dist / _pinchLastDist;
    if(Math.abs(scale - 1) > 0.01) {
      const oldZoom = zoomLevel;
      zoomLevel = Math.round(Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel * scale)) * 1000) / 1000;
      if(Math.abs(zoomLevel - oldZoom) > 0.001) {
        const sr = scrollArea.getBoundingClientRect();
        const cx = c.x - sr.left + scrollArea.scrollLeft;
        const cy = c.y - sr.top + scrollArea.scrollTop;
        const zoomRatio = zoomLevel / oldZoom;
        resize();
        _updateZoomPill();
        requestAnimationFrame(() => {
          scrollArea.scrollLeft = cx * zoomRatio - (c.x - sr.left);
          scrollArea.scrollTop  = cy * zoomRatio - (c.y - sr.top);
        });
      }
    }
  }
  _pinchLastDist = dist;
}
function onPanEnd(e){
  if(e.touches.length < 2){
    _panActive = false;
  }
}

[cv, fd.canvas].forEach(el => {
  el.addEventListener('touchstart', onPanStart, {passive:true});
  el.addEventListener('touchmove',  onPanMove,  {passive:false});
  el.addEventListener('touchend',   onPanEnd,   {passive:true});
  el.addEventListener('touchcancel',onPanEnd,   {passive:true});
});

// ── Edge swipe page turn (touch only) ─────────────────────────────────
// Tap near left/right edge to turn pages. Fully passive — doesn't block other handlers.
(()=>{
  if(!window.matchMedia('(pointer:coarse)').matches) return;
  const EDGE_ON_PAGE = 0.05;
  const MAX_TIME = 300;
  let startX = null, startY = null, startTime = 0, startEdge = null;

  function checkEdge(e) {
    if(e.touches.length !== 1 || pages.length <= 1) return null;
    const r = cv.getBoundingClientRect();
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    if(y < r.top || y > r.bottom) return null;
    if(x < r.left + r.width * EDGE_ON_PAGE) return 'left';
    if(x > r.right - r.width * EDGE_ON_PAGE) return 'right';
    return null;
  }

  const sa = document.querySelector('.scroll-area');
  sa.addEventListener('touchstart', e => {
    const edge = checkEdge(e);
    if(edge) {
      startEdge = edge;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startTime = Date.now();
    } else {
      startEdge = null;
    }
  }, {passive:true});

  sa.addEventListener('touchend', e => {
    if(!startEdge) return;
    const dt = Date.now() - startTime;
    const edge = startEdge;
    startEdge = null;
    if(dt > MAX_TIME) return;
    const t = e.changedTouches[0];
    const dx = Math.abs(t.clientX - startX);
    const dy = Math.abs(t.clientY - startY);
    if(dx > 40 || dy > 40) return;

    if(edge === 'left' && currentPage > 0) {
      switchPage(currentPage - 1);
    } else if(edge === 'right' && currentPage < pages.length - 1) {
      switchPage(currentPage + 1);
    }
  }, {passive:true});
})();

// ── Clef style dropdowns (treble + bass) ────────────────────────────────
(()=>{
  function setupClefDropdown(btnId, menuId) {
    const btn = document.getElementById(btnId);
    const menu = document.getElementById(menuId);
    if(!btn || !menu) return;

    // Store icon SVGs for each mode from the menu items
    const iconMap = {};
    menu.querySelectorAll('.clef-opt').forEach(opt => {
      const svg = opt.querySelector('svg');
      if(svg) iconMap[opt.dataset.clefmode] = svg.outerHTML;
    });

    // Target button icon sizes and tight viewBoxes for button context
    const btnSizes = {
      'clef-treble': [14, 29], 'clef-treble-hand': [11, 27],
      'clef-bass': [18, 26], 'clef-bass-hand': [20, 29]
    };
    const btnViewBoxes = {
      'clef-treble-hand': '3.7 0.2 11.2 27.6',
      'clef-bass-hand': '-2 0 20 24'
    };
    // Stroke weights adjusted so both clefs render at equal pixel weight in button
    const btnStrokes = {};
    function updateBtnIcon(m){
      if(!iconMap[m]) return;
      let svg = iconMap[m].replace(/currentColor/g, '#1C1508');
      const sz = btnSizes[m];
      if(sz) svg = svg.replace(/width="[^"]*"/, 'width="'+sz[0]+'"').replace(/height="[^"]*"/, 'height="'+sz[1]+'"');
      const vb = btnViewBoxes[m];
      if(vb) svg = svg.replace(/viewBox="[^"]*"/, 'viewBox="'+vb+'"');
      const sw = btnStrokes[m];
      if(sw) for(const [from,to] of Object.entries(sw)) svg = svg.replaceAll('stroke-width="'+from+'"', 'stroke-width="'+to+'"');
      btn.innerHTML = svg;
    }

    function showMenu(){
      const r = btn.getBoundingClientRect();
      menu.style.display = 'flex';
      menu.style.left = r.left + 'px';
      menu.style.top = (r.bottom + 2) + 'px';
    }
    function hideMenu(){ menu.style.display = 'none'; }
    function isOpen(){ return menu.style.display !== 'none'; }

    const CLEF_HOLD_DELAY = 400;
    let clefHoldTimer = null;
    let clefSuppressClick = false;

    btn.addEventListener('mousedown', e => {
      clefSuppressClick = false;
      clefHoldTimer = setTimeout(()=>{
        clefSuppressClick = true;
        document.querySelectorAll('#trebleClefMenu,#bassClefMenu').forEach(m=>{ if(m !== menu) m.style.display = 'none'; });
        showMenu();
      }, CLEF_HOLD_DELAY);
    });
    btn.addEventListener('mouseup', () => { clearTimeout(clefHoldTimer); });
    btn.addEventListener('mouseleave', () => { clearTimeout(clefHoldTimer); });
    btn.addEventListener('click', e => {
      if(clefSuppressClick){ clefSuppressClick = false; return; }
      hideMenu();
      // Activate clef tool with current mode
      selectMode(btn.dataset.mode);
    });
    // Touch: long-press for menu
    btn.addEventListener('touchstart', e => {
      clefSuppressClick = false;
      clefHoldTimer = setTimeout(()=>{
        clefSuppressClick = true;
        document.querySelectorAll('#trebleClefMenu,#bassClefMenu').forEach(m=>{ if(m !== menu) m.style.display = 'none'; });
        showMenu();
      }, CLEF_HOLD_DELAY);
    }, {passive:true});
    btn.addEventListener('touchend', () => { clearTimeout(clefHoldTimer); }, {passive:true});

    function selectMode(m){
      btn.dataset.mode = m;
      updateBtnIcon(m);
      hideMenu();
      document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('[data-head]').forEach(x=>x.classList.remove('on'));
      document.getElementById('keySigBtn').classList.remove('on');
      btn.classList.add('on');
      mode = m;
      cv.style.cursor = 'crosshair'; fd.canvas.style.cursor = 'crosshair';
      fd.canvas.style.pointerEvents = 'none';
      updateAccidentalState(); updatePenControls(); render();
    }

    menu.querySelectorAll('.clef-opt').forEach(opt => {
      opt.addEventListener('mousedown', e => {
        e.preventDefault(); e.stopPropagation();
        selectMode(opt.dataset.clefmode);
      });
      opt.addEventListener('touchstart', e => {
        e.preventDefault(); e.stopPropagation();
        selectMode(opt.dataset.clefmode);
      }, {passive:false});
    });

    document.addEventListener('mousedown', e=>{
      if(isOpen() && !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) hideMenu();
    });
    document.addEventListener('touchstart', e=>{
      if(isOpen() && !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) hideMenu();
    }, {passive:true});
  }

  setupClefDropdown('trebleClefBtn', 'trebleClefMenu');
  setupClefDropdown('bassClefBtn', 'bassClefMenu');
})();

// ── Zoom reset pill (desktop only) ───────────────────────────────────────
function _updateZoomPill(){
  const pill = document.getElementById('zoomPill');
  if(_isIPhone || !pill) return;
  if(Math.abs(zoomLevel - 1.0) > 0.01){
    document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
    pill.style.display = '';
  } else {
    pill.style.display = 'none';
  }
}
document.getElementById('zoomPill').addEventListener('click', ()=>{
  zoomLevel = 1.0;
  resize();
  _updateZoomPill();
  document.querySelector('.scroll-area').scrollLeft = 0;
  document.querySelector('.scroll-area').scrollTop = 0;
});

// ── iPhone floating undo/redo/clear pill ─────────────────────────────────
if(_isIPhone)(()=>{
  const pu = document.getElementById('iPhoneUndo');
  const pr = document.getElementById('iPhoneRedo');
  const pc = document.getElementById('iPhoneClear');
  if(pu) pu.addEventListener('click', ()=> document.getElementById('undoBtn').click());
  if(pr) pr.addEventListener('click', ()=> document.getElementById('redoBtn').click());
  if(pc) pc.addEventListener('click', ()=> document.getElementById('clearBtn').click());
  const ps = document.getElementById('iPhoneShare');
  if(ps) ps.addEventListener('click', async ()=>{
    // Render a clean PNG of the current page (no selection highlights)
    const oldSel = sel, oldSelSet = [...selSet];
    sel = null; selSet = [];
    render(); fd.redrawAll();
    // Create a composite canvas with both notation and pen strokes
    const dpr = window.devicePixelRatio || 1;
    const expW = cv.width, expH = cv.height;
    const expCanvas = document.createElement('canvas');
    expCanvas.width = expW; expCanvas.height = expH;
    const ectx = expCanvas.getContext('2d');
    ectx.drawImage(cv, 0, 0);
    ectx.drawImage(fd.canvas, 0, 0);
    // Restore selection
    sel = oldSel; selSet = oldSelSet;
    render(); fd.redrawAll();
    // Convert to blob and share
    expCanvas.toBlob(async (blob) => {
      if(!blob) return;
      const file = new File([blob], 'manuscript.png', {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try { await navigator.share({files:[file]}); } catch(e){}
      } else {
        // Fallback: download
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'manuscript.png';
        a.click(); URL.revokeObjectURL(url);
      }
    }, 'image/png');
  });
})();

// ── iPhone swipe to turn page ────────────────────────────────────────────
if(_isIPhone)(()=>{
  let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
  let swipeTracking = false;

  cv.addEventListener('touchstart', e => {
    if(e.touches.length !== 1) return;
    const t = e.touches[0];
    const r = cv.getBoundingClientRect();
    const ly = (t.clientY - r.top) * (LH / r.height);
    // Only start tracking if touch is in top margin, bottom margin, or below last staff
    const firstStaffTop = stTop(0);
    const lastStaffBottom = stTop(SC - 1) + SH;
    const inMargin = ly < firstStaffTop - LS || ly > lastStaffBottom + LS;
    if(inMargin){
      swipeStartX = t.clientX;
      swipeStartY = t.clientY;
      swipeStartTime = Date.now();
      swipeTracking = true;
    } else {
      swipeTracking = false;
    }
  }, {passive: true});

  cv.addEventListener('touchend', e => {
    if(!swipeTracking) return;
    swipeTracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - swipeStartX;
    const dy = t.clientY - swipeStartY;
    const dt = Date.now() - swipeStartTime;
    // Require: >80px horizontal, <40px vertical, <400ms
    if(Math.abs(dx) > 80 && Math.abs(dy) < 40 && dt < 400){
      if(dx < 0) switchPage(currentPage + 1); // swipe left = next
      else switchPage(currentPage - 1); // swipe right = prev
    }
  }, {passive: true});
})();

(()=>{

  window.addEventListener('mousemove', () => { isTouch = false; }, {passive:true, once:false});
  document.querySelectorAll('[title]').forEach(el => {

    el.removeAttribute('title');

// ── Text Label Tool ──────────────────────────────────────────────────────
// textLabels[] = {id, x, y, w, text, fontSize, fontFamily}
// x,y = top-left in logical coords; w = box width in logical coords
// fontSize stored as pt-like value (CSS px at 96dpi baseline, independent of canvas scale)
// fontFamily stored as CSS font-family string

let textGhost     = null; // {x,y,w,h} rubber-band rect while dragging
let textDragStart = null; // {x,y} logical start of current drag

const DEFAULT_FONT_FAMILY = 'Georgia,serif';
const DEFAULT_FONT_SIZE_PT = 14; // pt-equivalent stored value

// Convert stored fontSize (pt-equivalent) → logical canvas px
function fsToLogical(pt){ return pt * (LW / 700) * 1.3; }
function fontStr(tl){
  const pt      = tl.fontSize   || DEFAULT_FONT_SIZE_PT;
  const fam     = tl.fontFamily || DEFAULT_FONT_FAMILY;
  const weight  = tl.bold   ? 'bold'   : 'normal';
  const style   = tl.italic ? 'italic' : 'normal';
  // Canvas font string: "italic bold 14px Georgia,serif"
  const variant = (style !== 'normal' ? style + ' ' : '') + (weight !== 'normal' ? weight + ' ' : '');
  return { logical: fsToLogical(pt), css: pt + 'px', family: fam, variant, underline: !!tl.underline };
}

// ── Draw ─────────────────────────────────────────────────────────────────
function drawTextLabels(){
  textLabels.forEach(tl => {
    if(tl.id === editingLabelId) return;

    const isSel = (sel && sel.type==='textLabel' && sel.id===tl.id) ||
                  selSet.some(s=>s.type==='textLabel' && s.id===tl.id);
    const col  = isSel ? SEL_COL : (tl.color || INK);
    const {logical: fs, family: fam, variant, underline} = fontStr(tl);
    const lh   = fs * 1.35;
    const pad  = fs * 0.3;

    cx.save();
    cx.font = `${variant}${fs}px ${fam}`;

    const boxW   = tl.w - pad * 2;
    const rawLines = (tl.text || '').split('\n');
    const wrapped  = [];
    rawLines.forEach(line => {
      if(!line){ wrapped.push(''); return; }
      let cur = '';
      line.split(' ').forEach(word => {
        const test = cur ? cur + ' ' + word : word;
        if(cx.measureText(test).width <= boxW){ cur = test; }
        else { if(cur) wrapped.push(cur); cur = word; }
      });
      if(cur) wrapped.push(cur);
    });
    if(!wrapped.length) wrapped.push('');

    const boxH = lh * wrapped.length + pad * 2;
    tl._w = tl.w;
    tl._h = boxH;

    // Selected: text turns red, no box border (box only shows when editing)
    cx.fillStyle = col;
    cx.globalAlpha = 1;
    wrapped.forEach((line, i) => {
      const baselineY = tl.y + pad + fs * 0.85 + i * lh;
      cx.fillText(line, tl.x + pad, baselineY);
      if(underline && line){
        const lineW = cx.measureText(line).width;
        cx.save();
        cx.strokeStyle = col;
        cx.lineWidth = Math.max(0.5, fs * 0.07);
        cx.beginPath();
        cx.moveTo(tl.x + pad, baselineY + fs * 0.12);
        cx.lineTo(tl.x + pad + lineW, baselineY + fs * 0.12);
        cx.stroke();
        cx.restore();
      }
    });
    cx.restore();
  });

  if(mode === 'text' && textGhost){
    cx.save();
    cx.strokeStyle = '#5580CC';
    cx.lineWidth = 1;
    cx.setLineDash([4, 3]);
    cx.globalAlpha = 0.7;
    cx.strokeRect(textGhost.x, textGhost.y, textGhost.w, textGhost.h);
    cx.setLineDash([]);
    cx.fillStyle = '#5580CC';
    cx.globalAlpha = 0.06;
    cx.fillRect(textGhost.x, textGhost.y, textGhost.w, textGhost.h);
    cx.restore();
  }
}

// ── Textarea + toolbar overlay ────────────────────────────────────────────
const textEditor  = document.getElementById('textLabelEditor');
const textToolbar = document.getElementById('textToolbar');
const selFamily   = document.getElementById('textFontFamily');
const selSize     = document.getElementById('textFontSize');
let editingLabelId = null;

function lToC(lv, axis){
  const frame = cv.parentElement;
  return lv * (axis === 'x' ? frame.offsetWidth / LW : frame.offsetHeight / LH);
}

function positionToolbar(){
  const frame  = cv.parentElement;
  const frameW = frame.offsetWidth;
  const frameH = frame.offsetHeight;
  const edLeft = parseFloat(textEditor.style.left);
  const edTop  = parseFloat(textEditor.style.top);
  const edH    = textEditor.offsetHeight || 32;
  const tbW    = textToolbar.offsetWidth  || 320;
  const tbH    = textToolbar.offsetHeight || 32;
  const gap    = 4;

  // Prefer above the editor; fall back to below if not enough room
  let top = edTop - tbH - gap;
  if(top < 0) top = edTop + edH + gap;
  // Clamp vertically within frame
  top = Math.max(0, Math.min(frameH - tbH, top));

  // Align left edge with editor, then clamp so right edge stays in frame
  let left = edLeft;
  left = Math.min(left, frameW - tbW - 2);
  left = Math.max(0, left);

  textToolbar.style.left = left + 'px';
  textToolbar.style.top  = top  + 'px';
}

function syncToolbarToLabel(tl){
  // Set family select
  const fam = tl.fontFamily || DEFAULT_FONT_FAMILY;
  for(let i=0; i<selFamily.options.length; i++){
    if(selFamily.options[i].value === fam){ selFamily.selectedIndex = i; break; }
  }
  // Set size select — find closest option
  const pt = tl.fontSize || DEFAULT_FONT_SIZE_PT;
  let bestIdx = 0, bestDiff = Infinity;
  for(let i=0; i<selSize.options.length; i++){
    const diff = Math.abs(parseFloat(selSize.options[i].value) - pt);
    if(diff < bestDiff){ bestDiff = diff; bestIdx = i; }
  }
  selSize.selectedIndex = bestIdx;
  // Set B/I/U button states
  btnBold.classList.toggle('on',      !!tl.bold);
  btnItalic.classList.toggle('on',    !!tl.italic);
  btnUnderline.classList.toggle('on', !!tl.underline);
  // Sync color dots
  const tlColor = tl.color || INK;
  document.querySelectorAll('.text-color').forEach(d => {
    d.classList.toggle('on', d.dataset.textcolor === tlColor);
  });
  // Mirror font onto the textarea itself
  const frame  = cv.parentElement;
  const scaleX = frame.offsetWidth / LW;
  textEditor.style.fontFamily  = fam;
  textEditor.style.fontSize    = (fsToLogical(pt) * scaleX) + 'px';
  textEditor.style.fontWeight  = tl.bold   ? 'bold'   : 'normal';
  textEditor.style.fontStyle   = tl.italic ? 'italic' : 'normal';
  textEditor.style.textDecoration = tl.underline ? 'underline' : 'none';
  textEditor.style.color       = document.body.classList.contains('light') ? tlColor : tlColor;
}

function applyToolbarToLabel(){
  const tl = textLabels.find(t => t.id === editingLabelId);
  if(!tl) return;
  tl.fontFamily = selFamily.value;
  tl.fontSize   = parseFloat(selSize.value);
  // bold/italic/underline updated directly by their button handlers
  const frame   = cv.parentElement;
  const scaleX  = frame.offsetWidth / LW;
  textEditor.style.fontFamily     = tl.fontFamily;
  textEditor.style.fontSize       = (fsToLogical(tl.fontSize) * scaleX) + 'px';
  textEditor.style.fontWeight     = tl.bold      ? 'bold'      : 'normal';
  textEditor.style.fontStyle      = tl.italic    ? 'italic'    : 'normal';
  textEditor.style.textDecoration = tl.underline ? 'underline' : 'none';
  fitEditorHeight();
  render();
}

function openTextEditor(tl){
  const frame  = cv.parentElement;
  const scaleX = frame.offsetWidth / LW;
  const pt     = tl.fontSize   || DEFAULT_FONT_SIZE_PT;
  const fam    = tl.fontFamily || DEFAULT_FONT_FAMILY;
  const cssPt  = fsToLogical(pt) * scaleX;
  const pad    = cssPt * 0.3;

  editingLabelId = tl.id;

  textEditor.style.left       = lToC(tl.x, 'x') + 'px';
  textEditor.style.top        = lToC(tl.y, 'y') + 'px';
  textEditor.style.width      = lToC(tl.w, 'x') + 'px';
  textEditor.style.minHeight  = (cssPt * 1.35 + pad * 2) + 'px';
  textEditor.style.height     = 'auto';
  textEditor.style.fontSize       = cssPt + 'px';
  textEditor.style.fontFamily     = fam;
  textEditor.style.fontWeight     = tl.bold      ? 'bold'      : 'normal';
  textEditor.style.fontStyle      = tl.italic    ? 'italic'    : 'normal';
  textEditor.style.textDecoration = tl.underline ? 'underline' : 'none';
  textEditor.style.lineHeight = '1.35';
  textEditor.style.padding    = pad + 'px ' + pad + 'px';
  textEditor.value            = tl.text || '';
  textEditor.style.display    = 'block';

  syncToolbarToLabel(tl);
  textToolbar.classList.add('show');

  render();

  // Focus synchronously to trigger iPad keyboard (must be in user gesture call stack)
  textEditor.focus();

  requestAnimationFrame(() => {
    positionToolbar();
    textEditor.focus(); // re-focus after layout in case it was lost
    textEditor.setSelectionRange(textEditor.value.length, textEditor.value.length);
    fitEditorHeight();
  });
}

function fitEditorHeight(){
  textEditor.style.height = 'auto';
  textEditor.style.height = Math.max(textEditor.scrollHeight, 32) + 'px';
  positionToolbar();
}

function commitTextEditor(){
  if(textEditor.style.display === 'none') return;
  const id  = editingLabelId;
  const txt = textEditor.value;
  textEditor.style.display = 'none';
  textToolbar.classList.remove('show');
  editingLabelId = null;

  const tl = textLabels.find(t => t.id === id);
  if(!tl) return;

  if(txt.trim()){
    tl.text = txt;
    // Recalculate cached height
    const {logical: fs, family: fam, variant: fv} = fontStr(tl);
    const lh  = fs * 1.35, pad = fs * 0.3;
    cx.font   = `${fv}${fs}px ${fam}`;
    const boxW = tl.w - pad * 2;
    let lc = 0;
    txt.split('\n').forEach(line => {
      if(!line){ lc++; return; }
      let cur = '';
      line.split(' ').forEach(word => {
        const test = cur ? cur + ' ' + word : word;
        if(cx.measureText(test).width <= boxW){ cur = test; }
        else { if(cur) lc++; cur = word; }
      });
      if(cur) lc++;
    });
    tl._h = lh * Math.max(1, lc) + pad * 2;
  } else {
    historyPush();
    textLabels = textLabels.filter(t => t.id !== id);
  }
  render();
}

function cancelTextEditor(){
  if(textEditor.style.display === 'none') return;
  const id = editingLabelId;
  textEditor.style.display = 'none';
  textToolbar.classList.remove('show');
  editingLabelId = null;
  const tl = textLabels.find(t => t.id === id);
  if(tl && !tl.text) textLabels = textLabels.filter(t => t.id !== id);
  render();
}

textEditor.addEventListener('input', fitEditorHeight);

textEditor.addEventListener('blur', e => {
  // Give the toolbar selects time to receive focus before deciding to commit
  setTimeout(() => {
    if(editingLabelId === null) return;
    const ae = document.activeElement;
    if(ae === selFamily || ae === selSize || textToolbar.contains(ae)) return;
    commitTextEditor();
  }, 200);
});

textEditor.addEventListener('keydown', e => {
  if(e.key === 'Escape'){ e.preventDefault(); cancelTextEditor(); return; }
  if(e.key === 'Enter' && e.shiftKey){ return; } // Shift+Enter = newline (default textarea behaviour)
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); commitTextEditor(); return; }
  e.stopPropagation();
  setTimeout(fitEditorHeight, 0);
});

// Toolbar selects: after change, refocus textarea so typing continues
function onToolbarChange(){
  const tl = textLabels.find(t => t.id === editingLabelId);
  if(!tl) return;
  tl.fontFamily = selFamily.value;
  tl.fontSize   = parseFloat(selSize.value);
  applyToolbarToLabel();
  // Small delay lets the select fully close before we steal focus back
  setTimeout(() => textEditor.focus(), 50);
}

selFamily.addEventListener('change', onToolbarChange);
selSize.addEventListener('change',   onToolbarChange);

// B / I / U toggle buttons
const btnBold      = document.getElementById('btnTextBold');
const btnItalic    = document.getElementById('btnTextItalic');
const btnUnderline = document.getElementById('btnTextUnderline');

function makeFmtToggle(btn, prop){
  btn.addEventListener('mousedown', e => e.preventDefault()); // keep textarea focus
  btn.addEventListener('click', () => {
    const tl = textLabels.find(t => t.id === editingLabelId);
    if(!tl) return;
    tl[prop] = !tl[prop];
    btn.classList.toggle('on', tl[prop]);
    applyToolbarToLabel();
    textEditor.focus();
  });
  // iPad touch
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    const tl = textLabels.find(t => t.id === editingLabelId);
    if(!tl) return;
    tl[prop] = !tl[prop];
    btn.classList.toggle('on', tl[prop]);
    applyToolbarToLabel();
    requestAnimationFrame(() => textEditor.focus());
  });
}
makeFmtToggle(btnBold,      'bold');
makeFmtToggle(btnItalic,    'italic');
makeFmtToggle(btnUnderline, 'underline');

// Text color dots
document.querySelectorAll('.text-color').forEach(dot => {

  });
});

// ── notationDown hook for text mode (drag-to-create) ─────────────────────
function textModeDown(x, y){
  if(editingLabelId !== null) commitTextEditor();
  const sy = snapTextLabelY(y, DEFAULT_FONT_SIZE_PT);
  textDragStart = {x, y: sy};
  textGhost     = {x, y: sy, w: 0, h: fsToLogical(DEFAULT_FONT_SIZE_PT) * 1.9};
}

function textModeMove(x, y){
  if(!textDragStart) return;
  const minW = fsToLogical(DEFAULT_FONT_SIZE_PT) * 3;
  const rawW = x - textDragStart.x;
  const w    = rawW > 0 ? Math.max(minW, rawW) : Math.min(-minW, rawW);
  const gx   = w > 0 ? textDragStart.x : textDragStart.x + w;
  textGhost  = {x: gx, y: textDragStart.y, w: Math.abs(w), h: fsToLogical(DEFAULT_FONT_SIZE_PT) * 1.9};
  render();
}

function textModeUp(x, y){
  if(!textDragStart){ textGhost = null; return; }
  const minW    = fsToLogical(DEFAULT_FONT_SIZE_PT) * 3;
  const rawW    = x - textDragStart.x;
  const absW    = Math.max(minW, Math.abs(rawW));
  const finalX  = rawW >= 0 ? textDragStart.x : textDragStart.x - absW;
  const finalY  = textDragStart.y; // already snapped in textModeDown
  textDragStart = null;
  textGhost     = null;

  const newLabel = {
    id: tlid++, x: finalX, y: finalY, w: absW, text: '',
    fontSize: DEFAULT_FONT_SIZE_PT, fontFamily: DEFAULT_FONT_FAMILY,
    bold: false, italic: false, underline: false, color: INK
  };
  historyPush();
  textLabels.push(newLabel);
  openTextEditor(newLabel);
  render();
}

// ── Double-tap/click existing label to edit ───────────────────────────────
cv.addEventListener('dblclick', e => {
  if(isDrawMode()) return;
  const {x, y} = logicalPos(e);
  for(const tl of textLabels){
    const h = tl._h || fsToLogical(tl.fontSize || DEFAULT_FONT_SIZE_PT) * 1.9;
    if(x >= tl.x && x <= tl.x + tl.w && y >= tl.y && y <= tl.y + h){
      sel    = {type: 'textLabel', id: tl.id};
      selSet = [];
      historyPush();
      openTextEditor(tl);
      return;
    }
  }
}, true);

// ── Restore from localStorage on page load ──────────────────────────────
(function tryAutoRestore(){
  try {
    const saved = localStorage.getItem(AUTOSAVE_KEY);
    if(!saved) return;
    const data = JSON.parse(saved);
    // Check for content in multi-page or legacy format
    let hasContent = false;
    if(data.pages && data.pages.length){
      hasContent = data.pages.some(pg =>
        (pg.notes&&pg.notes.length) || (pg.stems&&pg.stems.length) ||
        (pg.barlines&&pg.barlines.length) || (pg.clefs&&pg.clefs.length) ||
        (pg.rests&&pg.rests.length) || (pg.hairpins&&pg.hairpins.length) ||
        (pg.keySigs&&pg.keySigs.length) || (pg.textLabels&&pg.textLabels.length) ||
        (pg.ties&&pg.ties.length) || (pg.beams&&pg.beams.length) ||
        (pg.fdStrokes&&pg.fdStrokes.length)
      );
      // Also count multiple pages as content even if all empty
      if(data.pages.length > 1) hasContent = true;
    } else {
      hasContent = (data.notes&&data.notes.length) || (data.stems&&data.stems.length) ||
        (data.barlines&&data.barlines.length) || (data.clefs&&data.clefs.length) ||
        (data.rests&&data.rests.length) || (data.hairpins&&data.hairpins.length) ||
        (data.keySigs&&data.keySigs.length) || (data.textLabels&&data.textLabels.length) ||
        (data.ties&&data.ties.length) || (data.beams&&data.beams.length) ||
        (data.fdStrokes&&data.fdStrokes.length);
    }
    if(!hasContent) return;
    restoreSaveData(data);
  } catch(e){ /* corrupt or missing — start fresh */ }
})();
</script>
