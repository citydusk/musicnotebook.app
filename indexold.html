function drawFlag(flag, col, alpha){
  const s=stems.find(s=>s.id===flag.stemId);
  if(!s) return;
  const up=stemIsUp(s);
  const tipY=visualStemTipY(s);
  const tipX=s.x;
  const noteY=s.y1;
  const maxReach=Math.abs(noteY-tipY)-LS;
  if(maxReach<LS) return;
  const count = flag.count||1; // 1=eighth, 2=sixteenth

  cx.save();
  cx.globalAlpha=alpha??1;
  cx.fillStyle=col;

  function drawFlagShape(cmds, ox, oy, scaleX, scaleY){
    cx.beginPath();
    for(const c of cmds){
      if      (c.cmd==='M') cx.moveTo(ox+c.x*scaleX, oy+c.y*scaleY);
      else if (c.cmd==='L') cx.lineTo(ox+c.x*scaleX, oy+c.y*scaleY);
      else if (c.cmd==='C') cx.bezierCurveTo(ox+c.x1*scaleX,oy+c.y1*scaleY, ox+c.x2*scaleX,oy+c.y2*scaleY, ox+c.x*scaleX,oy+c.y*scaleY);
      else if (c.cmd==='Z') cx.closePath();
    }
    cx.fill('evenodd');
  }

  const scale8  = SH * 0.8269; // 8th/16th scale
  const scale32 = SH * 1.15;  // 32nd scale — larger to fit 3 curves
  const stemExt = scale32 - scale8; // extra length to extend stem for 32nd

  if(up){
    if(count===1){
      drawFlagShape(getUpFlagCmds(), tipX, tipY, scale8, scale8);
    } else if(count===2){
      drawFlagShape(getUpFlag16Cmds(), tipX - LS*0.075, tipY, scale8, scale8);
    } else {
      // 32nd: extend stem upward first, then draw flag from new tip
      const extTipY = tipY - stemExt;
      drawStemLine(tipX, tipY, extTipY, col, alpha??1);
      drawFlagShape(getUpFlag32Cmds(), tipX - LS*0.075, extTipY, scale32, scale32);
    }
  } else {
    const scaleX = scale8 * 1.02;
    const scaleX32 = scale32 * 1.02;
    const oy   = tipY - 1.0*scale8  + LS*0.5;
    const oy32 = tipY - 1.0*scale32 + LS*0.5;
    if(count===1){
      drawFlagShape(getDownStemFlagCmds(), tipX, oy, scaleX, scale8);
    } else if(count===2){
      drawFlagShape(getDownFlag16Cmds(), tipX - LS*0.075, oy, scaleX, scale8);
    } else {
      // 32nd: extend stem downward first so flag clears the notehead
      const extTipY = tipY + stemExt;
      drawStemLine(tipX, tipY, extTipY, col, alpha??1);
      const oyExt = extTipY - 1.0*scale32 + LS*0.5;
      drawFlagShape(getDownFlag32Cmds(), tipX - LS*0.075, oyExt, scaleX32, scale32);
    }
  }

  cx.restore();
}
function scrubCursorBounds(x, y){
  const si = findStaff(y);
  if(si < 0) return null;

  // Find the nearest barline to the LEFT of the cursor
  let nearest = null;
  for(const b of barlines){
    if(b.x <= x){
      if(!nearest || b.x > nearest.x) nearest = b;
    }
  }

  let topSi = si, botSi = si;

  // Only expand if the nearest barline is multi-staff AND spans this staff
  if(nearest && nearest.s1 !== nearest.s2 && si >= nearest.s1 && si <= nearest.s2){
    topSi = nearest.s1;
    botSi = nearest.s2;
  }

  let yTop = stTop(topSi) - LS;
  let yBot = stTop(botSi) + SH + LS;

  // Expand to cover any notes with ledger lines near the scrub position
  const SCRUB_SNAP = NW * 3;
  for(const n of notes){
    if(n.si < topSi || n.si > botSi) continue;
    if(Math.abs(n.x - x) > SCRUB_SNAP) continue;
    const noteY = slotY(n.slot, n.si);
    if(noteY < yTop) yTop = noteY - LS;
    if(noteY > yBot) yBot = noteY + LS;
  }

  return {si, topSi, botSi, yTop, yBot};
}

function drawScrubCursor(){
  if(mode!=='scrub'||scrubX===null||scrubY===null) return;
  const bounds = scrubCursorBounds(scrubX, scrubY);
  if(!bounds) return;
  cx.save();
  cx.strokeStyle = 'rgba(40,180,80,0.5)';
  cx.lineWidth = NW * 2.2;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(scrubX, bounds.yTop);
  cx.lineTo(scrubX, bounds.yBot);
  cx.stroke();
  cx.restore();
}

function drawGrid(){
  if(!showGrid) return;
  cx.save();
  cx.lineWidth=0.5;
  const xStart = LM - Math.floor(LM/LS)*LS - LS;
  let xi=0;
  for(let gx=xStart;gx<=LW;gx+=LS,xi++){
    cx.strokeStyle=xi%2===0?'rgba(60,140,80,0.18)':'rgba(60,140,80,0.35)';
    cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx,LH);cx.stroke();
  }
  const yStart = MT - Math.floor(MT/LS)*LS;
  let yi=0;
  for(let gy=yStart;gy<=LH;gy+=LS,yi++){
    cx.strokeStyle=yi%2===0?'rgba(60,140,80,0.18)':'rgba(60,140,80,0.35)';
    cx.beginPath();cx.moveTo(0,gy);cx.lineTo(LW,gy);cx.stroke();
  }
  cx.restore();
}

function drawAlignGuide(){
  if(!alignGuide) return;
  cx.save();
  cx.lineWidth = _isIPhone ? LS * 0.15 : 1.2;
  cx.strokeStyle = _isIPhone ? 'rgba(60,140,80,0.7)' : 'rgba(60,140,80,0.7)';
  cx.setLineDash(_isIPhone ? [LS*0.4, LS*0.3] : [3,3]);
  cx.beginPath();
  cx.moveTo(alignGuide.x, alignGuide.y1);
  cx.lineTo(alignGuide.x, alignGuide.y2);
  cx.stroke();
  cx.setLineDash([]);
  cx.restore();
}

function render(){
  const t=cx.getTransform();cx.setTransform(1,0,0,1,0,0);cx.clearRect(0,0,cv.width,cv.height);cx.setTransform(t);
  fd.redrawAll();
  drawPaper();
  drawWatermark();
  drawGrid();
  drawAlignGuide();
  const allGroups=[];for(let s=0;s<SC;s++)allGroups.push(chordsOnStaff(notes.filter(n=>n.si===s)));
  const ghostGroups=ghost?[[ghost]]:[];
  for(let s=0;s<SC;s++)allGroups[s].forEach(g=>drawChordGroupPass(g,false,0));
  ghostGroups.forEach(g=>drawChordGroupPass(g,true,0));
  for(let s=0;s<SC;s++)drawStaffLines(s);
  clefs.forEach(c=>drawClef(c,false));
  if(clefGhost)drawClef(clefGhost,true);
  // Draw key signatures
  keySigs.forEach(k=>{
    const isSelKs=(sel&&sel.type==='keysig'&&sel.id===k.id)||selSet.some(s=>s.type==='keysig'&&s.id===k.id);
    drawKeySig(k.x, k.si, k.sharps, isSelKs?SEL_COL:INK, 1);
  });
  // Key sig ghost
  if(mode==='keysig' && keySigGhost){
    drawKeySig(keySigGhost.x, keySigGhost.si, keySigValue, INK, 0.35);
  }
  if(restGhost){
    const rgy=slotY(restGhost.slot, restGhost.si);
    const rgt=restGhost.type||restType;
    drawRest(restGhost.x, rgy, rgt, INK, 0.35);
    if(noteDot){
      const dp=restDotPos(restGhost.x, rgy, restGhost.slot, rgt);
      cx.save(); cx.globalAlpha=0.35; cx.fillStyle=INK;
      cx.beginPath(); cx.arc(dp.dotX, dp.dotY, DOT_R, 0, Math.PI*2); cx.fill();
      cx.restore();
    }
  }
  for(let s=0;s<SC;s++)allGroups[s].forEach(g=>drawChordGroupPass(g,false,1));
  ghostGroups.forEach(g=>drawChordGroupPass(g,true,1));
  for(let s=0;s<SC;s++)allGroups[s].forEach(g=>drawChordGroupPass(g,false,2));
  ghostGroups.forEach(g=>drawChordGroupPass(g,true,2));
  // Build a map of stem id → tip y on the primary beam slant line.
  // Also store each primary beam's slant for child (16th) beams to sample from.
  const beamedTipY = new Map();
  const beamSlant  = new Map(); // beam.id → {endLx, leftY, endRx, rightY}
  beams.filter(b=>(b.layer||0)===0).forEach(b=>{
    const s1=stems.find(s=>s.id===b.stemId1);
    const s2=stems.find(s=>s.id===b.stemId2);
    if(!s1||!s2) return;
    const members=beamMembers(s1,s2);
    if(members.length<2) return;
    const up=stemIsUp(s1);
    const [endL,endR]=s1.x<=s2.x?[s1,s2]:[s2,s1];
    let leftY=stemTipY(endL), rightY=stemTipY(endR);
    const slant=rightY-leftY;
    const MAX_SLANT=LS*4;
    if(Math.abs(slant)>MAX_SLANT){
      const capped=Math.sign(slant)*MAX_SLANT;
      if(up){if(leftY<rightY)rightY=leftY+capped;else leftY=rightY-capped;}
      else  {if(leftY>rightY)rightY=leftY+capped;else leftY=rightY-capped;}
    }
    beamSlant.set(b.id,{endLx:endL.x,leftY,endRx:endR.x,rightY});
    const spanX=endR.x-endL.x;
    members.forEach(s=>{
      const t=spanX>0.1?(s.x-endL.x)/spanX:0;
      beamedTipY.set(s.id, leftY+t*(rightY-leftY));
    });
  });
  // (Child beams are drawn between the primary beam and noteheads,
  //  so no stem extension is needed for them.)
  // Build a map of flagged down-stem id → extended tip y (bottom of flag)
  const flaggedTipY = new Map();
  flags.forEach(f=>{
    const s=stems.find(s=>s.id===f.stemId);
    if(!s||stemIsUp(s)) return; // only down-stems
    // For 32nd, stem is extended downward by stemExt before the flag is drawn
    const sc8 = SH*0.8269, sc32 = SH*1.15;
    const ext = (f.count||1) >= 3 ? (sc32 - sc8) : 0;
    // Flag bottom = extended tipY + LS*0.5
    flaggedTipY.set(s.id, s.y2 + ext + LS*0.5);
  });
  stems.forEach(s=>{
    const tip = flaggedTipY.has(s.id) ? flaggedTipY.get(s.id) :
                beamedTipY.has(s.id)  ? beamedTipY.get(s.id)  : s.y2;
    const selStem=selSet.some(ss=>ss.type==='stem'&&ss.id===s.id);
    drawStemLine(s.x,s.y1,tip,selStem?SEL_COL:INK,1);
  });
  if(stemDragging&&stemStart&&stemCurrent!==null)
    drawStemLine(stemStart.x,stemStart.y,stemCurrent,'#5580CC',0.65);
  beams.forEach(b=>{
    const selS1=selSet.some(s=>s.type==='stem'&&s.id===b.stemId1);
    const selS2=selSet.some(s=>s.type==='stem'&&s.id===b.stemId2);
    let selBeam=sel&&sel.type==='beam'&&sel.id===b.id;
    // Also highlight child beams that belong to the selected primary beam's group
    if(!selBeam&&sel&&sel.type==='beam'){
      const primary=beams.find(p=>p.id===sel.id);
      if(primary&&(b.layer||0)!==0) selBeam=beamSharesPrimary(b,primary);
    }
    drawBeam(b,(selS1||selS2||selBeam)?SEL_COL:INK,1,beamedTipY,beamSlant);
  });
  flags.forEach(f=>{
    const selStem=selSet.some(s=>s.type==='stem'&&s.id===f.stemId);
    drawFlag(f,selStem?SEL_COL:INK,1);
  });
  if(beamDragging&&beamStartStem&&beamGhostEnd){
    // Show an extended beam preview when EITHER the start or target stem is a beam
    // endpoint and the other stem is OUTSIDE that beam group.
    const targetStem=findStemTip(beamGhostEnd.x,beamGhostEnd.y);
    let showedExtend=false;

    // Helper: try to show extend preview for a given beam, drag-side stem, and far stem
    function tryExtendPreview(beam, dragStem, farStem){
      const anchorStemId=beam.stemId1===dragStem.id?beam.stemId2:beam.stemId1;
      const anchorStem=stems.find(s=>s.id===anchorStemId);
      if(!anchorStem||!farStem) return false;
      const bs1=stems.find(s=>s.id===beam.stemId1);
      const bs2=stems.find(s=>s.id===beam.stemId2);
      const members=(bs1&&bs2)?beamMembers(bs1,bs2):[];
      const farInGroup=members.some(m=>m.id===farStem.id);
      if(!farInGroup&&farStem.id!==anchorStemId
        &&stemIsUp(farStem)===stemIsUp(anchorStem)
        &&stemStaff(farStem)===stemStaff(anchorStem)){
        drawBeamPreview(anchorStem,farStem.x,stemTipY(farStem),'#5580CC',0.55);
        return true;
      }
      return false;
    }

    // Check start stem as beam endpoint → extending toward target
    const startEpBeams=beamsWithEndpoint(beamStartStem);
    if(startEpBeams.length>0&&targetStem){
      showedExtend=tryExtendPreview(startEpBeams[0],beamStartStem,targetStem);
    }
    // Check target stem as beam endpoint → extending toward start
    if(!showedExtend&&targetStem){
      const targetEpBeams=beamsWithEndpoint(targetStem);
      if(targetEpBeams.length>0){
        showedExtend=tryExtendPreview(targetEpBeams[0],targetStem,beamStartStem);
      }
    }
    if(!showedExtend){
      drawBeamPreview(beamStartStem,beamGhostEnd.x,beamGhostEnd.y,'#5580CC',0.55);
    }
  }
  if(mode==='stem-beam'&&!beamDragging&&!stemDragging&&beamGhostEnd)
    drawBeamHoverHint(beamGhostEnd.x,beamGhostEnd.y);
  // Beam-extend preview: show where the beam would extend to
  if(beamExtendDrag&&beamGhostEnd&&selDragging){
    const bed=beamExtendDrag;
    // The anchor stem is the OTHER endpoint of the beam (the one not being dragged)
    const anchorStemId=bed.whichEnd==='stemId1'?bed.beam.stemId2:bed.beam.stemId1;
    const anchorStem=stems.find(s=>s.id===anchorStemId);
    if(anchorStem){
      const targetStem=findStemTip(beamGhostEnd.x,beamGhostEnd.y);
      if(targetStem&&targetStem.id!==anchorStemId&&stemIsUp(targetStem)===stemIsUp(anchorStem)&&stemStaff(targetStem)===stemStaff(anchorStem)){
        drawBeamPreview(anchorStem,targetStem.x,stemTipY(targetStem),SEL_COL,0.45);
        // Draw a highlight dot on the target stem tip
        cx.save();cx.fillStyle=SEL_COL;cx.globalAlpha=0.6;
        cx.beginPath();cx.arc(targetStem.x,stemTipY(targetStem),LS*0.7,0,Math.PI*2);cx.fill();cx.restore();
      } else {
        // No valid target — draw preview from anchor to cursor
        drawBeamPreview(anchorStem,beamGhostEnd.x,beamGhostEnd.y,SEL_COL,0.3);
      }
    }
  }

  // Draw committed barlines
  barlines.forEach(b=>drawBarline(b.x,b.y1,b.y2,INK,1,b.final));

  // Live hairpin preview while dragging
  if(hpDragging&&hpStart&&beamGhostEnd){
    const dx=beamGhostEnd.x-hpStart.x;
    if(Math.abs(dx)>LS*0.5){
      drawHairpin({x1:hpStart.x, y:hpStart.y, x2:beamGhostEnd.x},'#5580CC',0.6);
    }
  }

  // Live dashed line preview while dragging
  if(dashDragging&&dashStart&&beamGhostEnd){
    const d=Math.hypot(beamGhostEnd.x-dashStart.x,beamGhostEnd.y-dashStart.y);
    if(d>LS*0.5){
      drawDashedLine(dashStart.x,dashStart.y,beamGhostEnd.x,beamGhostEnd.y,'#5580CC',0.6);
    }
  }

  // Live barline preview while dragging
  if(blDragging&&blX!==null&&blStartStaff!==null&&blEndStaff!==null){
    const s1=Math.min(blStartStaff,blEndStaff);
    const s2=Math.max(blStartStaff,blEndStaff);
    const{y1,y2}=barlineY(s1,s2);
    drawBarline(blX,y1,y2,'#5580CC',0.6,mode==='barline-final');
  }
  drawLasso();
  drawRectSel();
  drawScrubCursor();
  for(let s=0;s<SC;s++)allGroups[s].forEach(g=>drawChordGroupPass(g,false,3));
  ghostGroups.forEach(g=>drawChordGroupPass(g,true,3));
  for(let s=0;s<SC;s++)allGroups[s].forEach(g=>drawChordGroupPass(g,false,4));
  ghostGroups.forEach(g=>drawChordGroupPass(g,true,4));
  // Draw rests
  rests.forEach(r=>{
    const ry=slotY(r.slot,r.si);
    const isSelRest=(sel&&sel.type==='rest'&&sel.id===r.id)||selSet.some(s=>s.type==='rest'&&s.id===r.id);
    const col=isSelRest?SEL_COL:INK;
    drawRest(r.x, ry, r.type||'quarter', col, 1);
    if(r.dot){
      const dp=restDotPos(r.x, ry, r.slot, r.type||'quarter');
      cx.save(); cx.globalAlpha=1; cx.fillStyle=col;
      cx.beginPath(); cx.arc(dp.dotX, dp.dotY, DOT_R, 0, Math.PI*2); cx.fill();
      cx.restore();
    }
  });
  drawTextLabels();
  drawSelectionHighlight();
  drawLassoHighlights();
  // Draw ties
  ties.forEach(t=>{
    const n1=notes.find(n=>n.id===t.noteId1), n2=notes.find(n=>n.id===t.noteId2);
    if(!n1||!n2) return;
    const isSelTie = sel && sel.type==='tie' && sel.id===t.id;
    const isSelEnd = sel && sel.type==='tieEnd' && sel.id===t.id;
    const isGroupSel = selSet.some(s=>s.type==='tie'&&s.id===t.id);
    const col = (isSelTie||isSelEnd||isGroupSel) ? SEL_COL : INK;
    const geo = drawTie(t, n1, n2, col, 1);
    t._geo = geo; // cache for hit-testing
    // Draw endpoint handle dots when this tie is selected
    if(isSelTie||isSelEnd){
      cx.save(); cx.fillStyle=SEL_COL; cx.globalAlpha=0.75;
      cx.beginPath(); cx.arc(geo.tx1, geo.p1y, LS*0.55, 0, Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(geo.tx2, geo.p2y, LS*0.55, 0, Math.PI*2); cx.fill();
      cx.restore();
    }
  });
  // Draw hairpins as notation objects
  hairpins.forEach(h=>{
    const isSelHp = sel && (sel.type==='hairpin'||sel.type==='hairpinEnd') && sel.id===h.id;
    const isGroupSel = selSet.some(s=>s.type==='hairpin'&&s.id===h.id);
    const col = (isSelHp||isGroupSel) ? SEL_COL : (h.color||INK);
    drawHairpin({x1:h.x1, y:h.y, x2:h.x2}, col, 1);
    if(isSelHp){
      // Draw endpoint handles
      cx.save(); cx.fillStyle=SEL_COL; cx.globalAlpha=0.75;
      cx.beginPath(); cx.arc(h.x1, h.y, LS*0.55, 0, Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(h.x2, h.y, LS*0.55, 0, Math.PI*2); cx.fill();
      cx.restore();
    }
  });
  // Ghost tie while dragging
  if(mode==='tie'&&tieDragging&&tieStartNote&&tieGhostEnd){
    const n1=tieStartNote;
    const x1=renderedNoteX(n1), y1=slotY(n1.slot,n1.si);
    const s=stems.find(s=>s.noteId===n1.id);
    const up=s ? s.y2<s.y1 : true;
    drawTieCoords(x1, y1, tieGhostEnd.x, y1, up, n1.slot, '#888', 0.45);
  }
  updateAccidentalState();
}

// Logical coords from mouse or touch on the notation canvas
function logicalPos(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches&&e.touches.length?e.touches[0]:e.changedTouches&&e.changedTouches.length?e.changedTouches[0]:e;
  return{x:(t.clientX-r.left)*(LW/r.width),y:(t.clientY-r.top)*(LH/r.height)};
}

const minX=NOTE_MIN_X,maxX=RM-4;

// Erase everything near (x,y) — used for both click and scrub
const ERASE_R = NW * 1.3; // tight radius around notehead size
function eraseAt(x, y) {
  let changed = false;
  // Clefs
  for(let i=clefs.length-1;i>=0;i--){
    const c=clefs[i];
    if((x>=c.x-LS*0.5&&x<=c.x+LS*2.5)&&Math.abs(y-(stTop(c.si)+SH/2))<SH){
      clefs.splice(i,1);changed=true;break;
    }
  }
  // Barlines
  for(let i=barlines.length-1;i>=0;i--){
    const b=barlines[i];
    if(Math.abs(x-b.x)<Math.max(BARLINE_W*2,LS)&&y>=b.y1-LS&&y<=b.y2+LS){
      barlines.splice(i,1);changed=true;break;
    }
  }
  // Rests
  for(let i=rests.length-1;i>=0;i--){
    const r=rests[i];
    const ry=slotY(r.slot,r.si);
    if(Math.abs(x-r.x)<LS*1.5&&Math.abs(y-ry)<LS*2){
      rests.splice(i,1);changed=true;break;
    }
  }
  // Key signatures
  for(let i=keySigs.length-1;i>=0;i--){
    const k=keySigs[i];
    const ky=stTop(k.si)+SH/2;
    const w=keySigWidth(k.sharps);
    if(x>=k.x-LS&&x<=k.x+w+LS&&Math.abs(y-ky)<SH/2+LS){
      keySigs.splice(i,1);changed=true;break;
    }
  }
  // Stems
  for(let i=stems.length-1;i>=0;i--){
    const s=stems[i];
    if(Math.abs(x-s.x)<LS*1.5&&y>=Math.min(s.y1,s.y2)-LS&&y<=Math.max(s.y1,s.y2)+LS){
      repointBeamsAwayFrom(s.id);
      stems.splice(i,1);changed=true;break;
    }
  }
  // Beams — check first. If the eraser hits the beam body between stems,
  // erase only the beam and return early so stems are left intact.
  {
    const beamsBefore=beams.length;
    beams=beams.filter(b=>{
      const s1=stems.find(s=>s.id===b.stemId1);
      const s2=stems.find(s=>s.id===b.stemId2);
      if(!s1||!s2) return false;
      const members=beamMembers(s1,s2);
      if(!members.length) return false;
      const xMin=members[0].x-LS, xMax=members[members.length-1].x+LS;
      if(x<xMin||x>xMax) return true;
      const [endL,endR]=s1.x<=s2.x?[s1,s2]:[s2,s1];
      const spanX=endR.x-endL.x;
      const t=spanX>0.1?(Math.max(endL.x,Math.min(endR.x,x))-endL.x)/spanX:0;
      const yAtX=visualStemTipY(endL)+t*(visualStemTipY(endR)-visualStemTipY(endL));
      return Math.abs(y-yAtX)>BEAM_H*2+ERASE_R;
    });
    if(beams.length!==beamsBefore){
      fd.eraseAt(x,y);
      render();
      return;
    }
  }
  // Flags — erase if click is near the flag area
  flags=flags.filter(f=>{
    const s=stems.find(s=>s.id===f.stemId);
    if(!s) return false;
    const ty=visualStemTipY(s);
    return !(Math.abs(x-s.x)<LS*2.5&&Math.abs(y-ty)<SH);
  });
  // Hairpins — erase if click is near either arm
  const hpBefore=hairpins.length;
  hairpins=hairpins.filter(h=>{
    const spread=HP_SPREAD;
    for(let t=0;t<=1;t+=0.05){
      const bx=h.x1+t*(h.x2-h.x1);
      if(Math.hypot(x-bx,y-(h.y-spread*t))<LS*1.2||
         Math.hypot(x-bx,y-(h.y+spread*t))<LS*1.2) return false;
    }
    return true;
  });
  if(hairpins.length!==hpBefore) changed=true;
  // Ties — erase if click is near the arc
  const tiesBefore = ties.length;
  ties = ties.filter(t=>{
    const n1=notes.find(n=>n.id===t.noteId1), n2=notes.find(n=>n.id===t.noteId2);
    if(!n1||!n2) return false;
    const x1=renderedNoteX(n1), y1=slotY(n1.slot,n1.si);
    const x2=renderedNoteX(n2), y2=slotY(n2.slot,n2.si);
    const s=stems.find(s=>s.noteId===n1.id);
    const up=s?s.y2<s.y1:true;
    const dir=up?1:-1;
    const endOff=(NH+STEP*0.45)*dir;
    const ey1=y1+endOff, ey2=y2+endOff;
    const cpX=(x1+x2)/2, cpY=(ey1+ey2)/2+dir*Math.min(LS*1.5,Math.abs(x2-x1)*0.28);
    // Sample points along the quadratic bezier and check proximity
    for(let t2=0;t2<=1;t2+=0.05){
      const bx=(1-t2)*(1-t2)*x1+2*(1-t2)*t2*cpX+t2*t2*x2;
      const by=(1-t2)*(1-t2)*ey1+2*(1-t2)*t2*cpY+t2*t2*ey2;
      if(Math.hypot(x-bx,y-by)<LS*1.2) return false;
    }
    return true;
  });
  if(ties.length!==tiesBefore) changed=true;
  // Accidentals — erase acc without removing the note
  for(const n of notes){
    if(!n.acc||n.acc==='none') continue;
    const nx=renderedNoteX(n), ny=slotY(n.slot,n.si);
    const xOff=accXOffFor(n);
    const ax=nx+xOff, ay=ny;
    const hh=ACC_HALF_H[n.acc]||LS*1.5;
    if(Math.abs(x-ax)<ACC_COL_W*0.7&&Math.abs(y-ay)<hh){
      n.acc='none'; delete n.accXOff; changed=true; break;
    }
  }
  // Notes
  const before=notes.length;
  const erasedNotes=notes.filter(n=>Math.hypot(x-n.x,y-slotY(n.slot,n.si))<ERASE_R);
  if(erasedNotes.length){
    // Repoint beams before removing stems
    erasedNotes.forEach(n=>{
      const delStem=stems.find(s=>s.noteId===n.id);
      if(delStem) repointBeamsAwayFrom(delStem.id);
    });
  }
  notes=notes.filter(n=>Math.hypot(x-n.x,y-slotY(n.slot,n.si))>=ERASE_R);
  if(notes.length!==before){ changed=true; ties=ties.filter(t=>notes.some(n=>n.id===t.noteId1)&&notes.some(n=>n.id===t.noteId2)); }
  // Text labels
  for(let i=textLabels.length-1;i>=0;i--){
    const tl=textLabels[i];
    const _h=tl._h||fsToLogical(tl.fontSize||DEFAULT_FONT_SIZE_PT)*1.9;
    if(x>=tl.x-LS&&x<=tl.x+tl.w+LS&&y>=tl.y-LS&&y<=tl.y+_h+LS){
      textLabels.splice(i,1);changed=true;break;
    }
  }
  // Free-draw strokes (delegate to fd)
  if(fd.eraseAt(x,y)) changed=true;
  if(changed)render();
}

let _isPenInput = false; // set true when Apple Pencil/stylus detected
let _penNoteDeferred = false; // true when note placement deferred to pointerup
let _clefJustPlaced = false;  // true after clef placed in notationDown, suppresses ghost until lift
let _lastAuditionSlot = null;
let _lastAuditionSi = null;

// iPhone note name popup
function _showNoteNamePopup(g){
  if(!_isIPhone) return;
  const popup = document.getElementById('noteNamePopup');
  if(!popup) return;
  const acc = effectiveAccidentalForGhost(g);
  const name = slotToNoteName(g.slot, acc, activeClefType(g.si, g.x));
  popup.textContent = name;
  // Position: convert logical coords to CSS, offset above finger
  const r = cv.getBoundingClientRect();
  const scaleX = r.width / LW;
  const scaleY = r.height / LH;
  const cx = r.left + g.x * scaleX;
  const cy = r.top + slotY(g.slot, g.si) * scaleY;
  popup.style.left = cx + 'px';
  popup.style.top = (cy - 50) + 'px';
  popup.style.display = 'block';
}
function _hideNoteNamePopup(){
  const popup = document.getElementById('noteNamePopup');
  if(popup) popup.style.display = 'none';
}

// Get effective accidental for a ghost note (not yet in notes array)
function effectiveAccidentalForGhost(g){
  if(g.acc && g.acc !== 'none') return g.acc;
  return keySigAccForSlot(g.si, g.x, g.slot);
}
let _isMouseMove = false; // true during mouse-originated moves (not touch)
let _pencilDetected = false; // once Pencil is used, reject finger draws
// Restore pencil detection from localStorage so palm rejection works immediately
if(localStorage.getItem('pencilDetected')) _pencilDetected = true;

function notationDown(x,y){
  if(editingLabelId !== null) commitTextEditor();
  if(mode==='none') return;
  if(mode==='lasso'){
    // If clicking inside existing selection, start group drag
    if(selSet.length>0){
      const inSel=selSet.some(({type,id})=>{
        if(type==='note'){const n=notes.find(n=>n.id===id);return n&&Math.hypot(x-renderedNoteX(n),y-slotY(n.slot,n.si))<NW*2;}
        if(type==='stem'){const s=stems.find(s=>s.id===id);return s&&Math.abs(x-s.x)<LS*2&&y>=Math.min(s.y1,s.y2)-LS&&y<=Math.max(s.y1,s.y2)+LS;}
        if(type==='barline'){const b=barlines.find(b=>b.id===id);return b&&Math.abs(x-b.x)<LS*2&&y>=b.y1-LS&&y<=b.y2+LS;}
        if(type==='clef'){const c=clefs.find(c=>c.id===id);return c&&(x>=c.x-LS*0.5&&x<=c.x+LS*2.5)&&Math.abs(y-(stTop(c.si)+SH/2))<SH;}
        if(type==='rest'){const r=rests.find(r=>r.id===id);return r&&Math.abs(x-r.x)<LS*1.5&&Math.abs(y-slotY(r.slot,r.si))<LS*2;}
        if(type==='keysig'){const k=keySigs.find(k=>k.id===id);if(!k)return false;const w=keySigWidth(k.sharps);return x>=k.x-LS&&x<=k.x+w+LS&&Math.abs(y-(stTop(k.si)+SH/2))<SH/2+LS;}
        if(type==='stroke'){
          const st=fd.getStrokes()[id];if(!st)return false;
          const scale=fd.cssW/LW;
          const zs=st.refW?fd.cssW/st.refW:1;
          const zp=zs===1?st.pts:st.pts.map(p=>({...p,x:p.x*zs,y:p.y*zs}));
          return strokeNearPoint(zp,x*scale,y*scale,LS*scale*3);
        }
        return false;
      });
      if(!inSel) pasteAnchor = {x, y}; // clicked outside selection — anchor for paste
      if(inSel){
        lassoGroupDrag=true;
        lassoGroupStart={x,y};
        const allStrokes=fd.getStrokes();
        lassoGroupOrig={
          notes: selSet.filter(s=>s.type==='note').map(({id})=>{const n=notes.find(n=>n.id===id);return n?{id,x:n.x,slot:n.slot,si:n.si}:null;}).filter(Boolean),

    let hitStrokeIdx = -1;

    }
  });

  if(hitNotes.length === 0) return;

  // For each hit note, find its chord group and play the whole chord
  const freqs = [];
  const alreadyGrouped = new Set();
  for(const hn of hitNotes){
    if(alreadyGrouped.has(hn.id)) continue;
    const staffNotes = notes.filter(n=>n.si===hn.si);
    const groups = chordsOnStaff(staffNotes);
    const group = groups.find(g=>g.some(n=>n.id===hn.id));
    if(group){
      for(const n of group){
        if(!scrubPlayed.has(n.id) && !ties.some(t=>t.noteId2===n.id)){
          freqs.push(slotToFreq(n.slot, effectiveAccidental(n), activeClefType(n.si, n.x)));
        }
        scrubPlayed.add(n.id);
        alreadyGrouped.add(n.id);
      }
    } else {
      scrubPlayed.add(hn.id);
      freqs.push(slotToFreq(hn.slot, effectiveAccidental(hn), activeClefType(hn.si, hn.x)));
    }
  }
  if(freqs.length) playFreqs(freqs);
}

function playChordAt(x, y){
  const si=findStaff(y);
  if(si<0) return;
  const staffNotes=notes.filter(n=>n.si===si);
  const groups=chordsOnStaff(staffNotes);
  for(const group of groups){
    if(group.some(n=>{
      const rx=renderedNoteX(n), ry=slotY(n.slot,n.si);
      return Math.hypot(x-rx,y-ry)<NW*2;
    })){
      playFreqs(group.map(n=>slotToFreq(n.slot,effectiveAccidental(n),activeClefType(n.si,n.x))));
      // Select the whole chord group
      sel=null;
      selSet=[];
      const noteIds=new Set(group.map(n=>n.id));
      group.forEach(n=>selSet.push({type:'note',id:n.id}));
      stems.filter(s=>noteIds.has(s.noteId)).forEach(s=>selSet.push({type:'stem',id:s.id}));
      // Switch to select mode so the selection is interactive (but not from scrub)
      if(mode!=='select'&&mode!=='lasso'&&mode!=='scrub'){
        document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));
        document.querySelectorAll('[data-head]').forEach(x=>x.classList.remove('on'));
        document.querySelector('[data-mode="select"]').classList.add('on');
        mode='select';
        cv.style.cursor='default'; fd.canvas.style.cursor='default';
        fd.canvas.style.pointerEvents='none';
      }
      render();
      return;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  RADIAL ACCIDENTAL PICKER  (long-press in note mode)
// ═══════════════════════════════════════════════════════════════
const RADIAL_DELAY = 650; // ms before menu appears
const RADIAL_DEAD = 15;   // px movement to cancel long press (generous for finger/pencil tremor)
const RADIAL_HIT = 28;    // px radius for option hit test

function _radialDrawGlyphs(){
  const accTypes = ['sharp','flat','natural'];
  const cfgMap = {sharp:{s:18,cmds:getSharpCmds}, flat:{s:17,cmds:getFlatCmds}, natural:{s:21,cmds:getNaturalCmds}};
  document.querySelectorAll('.radial-acc').forEach(c=>{
    const acc = c.dataset.racc;
    const cfg = cfgMap[acc]; if(!cfg) return;
    const ctx = c.getContext('2d');
    const dpr = window.devicePixelRatio||1;
    c.width = 36*dpr; c.height = 36*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,36,36);
    const cmds = cfg.cmds();
    const s = cfg.s;
    const ox = 18, oy = 18;
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--select-color').trim() || INK;
    ctx.beginPath();
    for(const cmd of cmds){
      if(cmd.cmd==='M') ctx.moveTo(ox+cmd.x*s, oy+cmd.y*s);
      else if(cmd.cmd==='L') ctx.lineTo(ox+cmd.x*s, oy+cmd.y*s);
      else if(cmd.cmd==='C') ctx.bezierCurveTo(ox+cmd.x1*s,oy+cmd.y1*s, ox+cmd.x2*s,oy+cmd.y2*s, ox+cmd.x*s,oy+cmd.y*s);
      else if(cmd.cmd==='Z') ctx.closePath();
    }
    ctx.fill('evenodd');
  });
}

function _radialShow(cx, cy){
  _radialOpen = true;
  // Cancel any deferred note placement (Apple Pencil/iPad path)
  if(_penNoteDeferred){
    _penNoteDeferred = false;
    _hideNoteNamePopup();
  }
  ghost = null; alignGuide = null;
  render();
  const menu = document.getElementById('radialAccMenu');
  menu.style.left = cx + 'px';
  menu.style.top = cy + 'px';
  menu.style.display = 'block';
  _radialDrawGlyphs();
  document.querySelectorAll('.radial-acc').forEach(c=>{ c.style.background='transparent'; });
}

function _radialHide(){
  _radialOpen = false;
  document.getElementById('radialAccMenu').style.display = 'none';
  if(_radialTimer){ clearTimeout(_radialTimer); _radialTimer=null; }
}

// Capture mouseup/touchend on the radial ring itself (since it has pointer-events:auto,
// the canvas underneath won't see the release event)
(function(){
  const ring = document.getElementById('radialRing');
  if(!ring) return;
  ring.addEventListener('mouseup', e=>{
    if(_radialOpen) _radialCommit(e.clientX, e.clientY);
  });
  ring.addEventListener('touchend', e=>{
    const src = e.changedTouches[0];
    if(_radialOpen && src) _radialCommit(src.clientX, src.clientY);
    e.preventDefault();
  }, {passive:false});
  ring.addEventListener('mousemove', e=>{
    if(_radialOpen) _radialHitTest(e.clientX, e.clientY);
  });
  ring.addEventListener('touchmove', e=>{
    const t0 = e.touches[0];
    if(_radialOpen && t0) _radialHitTest(t0.clientX, t0.clientY);
    e.preventDefault();
  }, {passive:false});
})();

function _radialHitTest(clientX, clientY){
  const opts = document.querySelectorAll('.radial-acc');
  let best = null, bestDist = RADIAL_HIT;
  opts.forEach(c=>{
    const r = c.getBoundingClientRect();
    const ocx = r.left + r.width/2;
    const ocy = r.top + r.height/2;
    const d = Math.hypot(clientX - ocx, clientY - ocy);
    if(d < bestDist){ bestDist = d; best = c.dataset.racc; }
  });
  // Highlight
  opts.forEach(c=>{
    c.style.background = (c.dataset.racc === best) ? 'rgba(128,128,128,0.2)' : 'transparent';
    c.style.borderRadius = '50%';
  });
  return best; // null = center/none
}

function _radialStartTimer(x, y, clientX, clientY){
  // Skip radial picker on iPhone and when an accidental is already selected
  if(_isIPhone) return false;
  if(noteAcc !== 'none') return false;
  if(_radialTimer) clearTimeout(_radialTimer);
  // Only start if we're on a valid staff position
  const si = findStaff(y);
  if(si < 0 || x < minX || x > maxX) return false;
  _radialPressPos = {x, y, cx: clientX, cy: clientY};
  _radialTimer = setTimeout(()=>{
    _radialTimer = null;
    _radialShow(clientX, clientY);
  }, RADIAL_DELAY);
  return true;
}

function _radialCancelTimer(){
  if(_radialTimer){ clearTimeout(_radialTimer); _radialTimer = null; }
}

function _radialCheckMove(clientX, clientY){
  if(_radialTimer && _radialPressPos){
    if(Math.hypot(clientX - _radialPressPos.cx, clientY - _radialPressPos.cy) > RADIAL_DEAD){
      _radialCancelTimer();
    }
  }
  if(_radialOpen){
    _radialHitTest(clientX, clientY);
  }
}

function _radialCommit(clientX, clientY){
  if(!_radialOpen){ _radialCancelTimer(); return false; }
  const acc = _radialHitTest(clientX, clientY);
  _radialAccOverride = acc || 'none'; // null means center = no accidental
  _radialHide();
  // Place the note at the original press position
  if(_radialPressPos){
    const {x, y} = _radialPressPos;
    const si = findStaff(y);
    if(si>=0 && x>=minX && x<=maxX){
      const sl = Math.max(MAX_LEDGER_SLOT_ABOVE, Math.min(MAX_LEDGER_SLOT_BELOW, ySlot(y,si)));
      let snappedX = snapX(x);
      const CHORD_SNAP = NW * 1.8;
      const nearbyNotes = notes.filter(n=>n.si===si&&Math.abs(n.x-snappedX)<=CHORD_SNAP);
      if(nearbyNotes.length > 0) snappedX = nearbyNotes[0].x;
      const sameSlot = notes.filter(n=>n.si===si&&n.slot===sl&&Math.abs(n.x-snappedX)<=SNAP_R);
      if(sameSlot.length<2){
        const newNote = {x:snappedX, slot:sl, si, head:headFromMode(), acc:accFromMode(), dot:dotFromMode(), id:nid++};
        historyPush();
        notes.push(newNote);
        syncTiedAccidentals();
        const groups = chordsOnStaff(notes.filter(n=>n.si===si));
        const myGroup = groups.find(g=>g.some(n=>n.id===newNote.id));
        if(myGroup) playFreqs(myGroup.map(n=>slotToFreq(n.slot,effectiveAccidental(n),activeClefType(n.si,n.x))));
      }
    }
  }
  _radialAccOverride = null;
  _radialPressPos = null;
  render();
  return true; // consumed the event
}

// Wire notation canvas events (only when not in draw mode)

},{passive:true});

  if(_radialOpen){ _radialCommit(e.clientX, e.clientY); return; }
  if(mode==='none'){ document.querySelector('[data-mode="select"]').click(); return; }
  const{x,y}=logicalPos(e);
  if(isNoteMode()){
    const si = findStaff(y);

      // Defer notationDown — start radial timer instead (skipped if accidental already selected)
      if(_radialStartTimer(x, y, e.clientX, e.clientY)) return;

  notationDown(x,y);
});

  if(isDrawMode())return;

},{passive:false});
cv.addEventListener('touchmove', e=>{

},{passive:false});

     Math.abs(x - _lastTapPos.x) < LS*2 && Math.abs(y - _lastTapPos.y) < LS*2){
    _lastTapTime = 0; _lastTapPos = null;

},{passive:false});
cv.addEventListener('touchcancel',()=>{if(!isDrawMode()){ghost=null;alignGuide=null;eraseHeld=false;_penNoteDeferred=false;_clefJustPlaced=false;_hideNoteNamePopup();render();}},{passive:true});
// ═══════════════════════════════════════════════════════════════
//  FREE-DRAW OVERLAY  (canvas #fc, sits on top)
// ═══════════════════════════════════════════════════════════════

const fd = (() => {
  const canvas = document.getElementById('fc');
  const ctx    = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // Physical px per mm at 96dpi (CSS baseline)
  const PX_PER_MM = 96 / 25.4;

  // Nib widths in CSS px
  // Touch devices (iPad) keep original heavier weight; desktop uses thinner strokes
  const _nibTouch = navigator.maxTouchPoints > 0;
  const NIB_MEDIUM = (_nibTouch ? 0.65 : 0.35) * PX_PER_MM;  // medium pen
  const NIB_BOLD   = (_nibTouch ? 0.9 : 0.55) * PX_PER_MM;   // bold pen
  function nibFine(){
    const base = Math.max(BARLINE_W * cssW / LW, 0.8);
    return _nibTouch ? base : base * 0.55;
  }

  const MIN_DIST = 1.0; // min pointer move to record a new point

  let dpr  = 1;
  let cssW = 560;
  let cssH = 720;

  // History for undo
  let strokes      = [];   // committed: [{pts, lineWidth}]
  let currentPts   = [];   // in-progress points
  let isDrawing    = false;
  let activePtr    = null; // pointer id
  let hasPressure  = false; // Apple Pencil detected

  // rAF
  let rafId = null;
  let dirty = false;

  function lineWidth() {
    return mode === 'draw-fine' ? nibFine() : mode === 'draw-medium' ? NIB_MEDIUM : mode === 'slur' ? NIB_MEDIUM : NIB_BOLD;
  }

  // Convert pointer event coords to canvas logical coords
  // The free-draw canvas is sized to match the notation canvas CSS size exactly,
  // so 1 pointer px = 1 CSS px = cssW/canvas.width logical units
  // Convert any event (pointer or touch) to canvas coords
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] || e.changedTouches[0] : e;
    return {
      x: (src.clientX - r.left),
      y: (src.clientY - r.top),
      pressure: e.pressure || (src.force > 0 ? src.force : 0.5),
    };
  }

  function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }

  // ── Generic drawing input ────────────────────────────────────

  function drawStart(e, isPen) {
    if (!isDrawMode()) return;
    if (isDrawing) finish();
    isDrawing   = true;
    hasPressure = isPen;
    const pt = getPos(e);
    let snapped = {...pt};
    if (window.penSmooth || mode === 'slur') {
      const snapRadius = LS * cssW / LW * 0.75;
      let best = snapRadius;
      for (const s of strokes) {
        if (!s.pts.length) continue;
        for (const ep of [s.pts[0], s.pts[s.pts.length-1]]) {
          const d = dist(pt, ep);
          if (d < best) { best = d; snapped = {...ep, pressure: pt.pressure}; }
        }
      }
    }
    currentPts  = [snapped];
    dirty = true;
    scheduleRender();
  }

  function drawMove(e) {
    if (!isDrawMode() || !isDrawing) return;
    // Coalesced events for pointer API, single event for touch
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : null;
    if (events && events.length > 0) {
      for (const ce of events) {
        const pt = getPos(ce);
        const prev = currentPts[currentPts.length - 1];
        if (prev && dist(pt, prev) < MIN_DIST) continue;
        currentPts.push(pt);
      }
    } else {
      const pt = getPos(e);
      const prev = currentPts[currentPts.length - 1];
      if (!prev || dist(pt, prev) >= MIN_DIST) currentPts.push(pt);
    }
    dirty = true;
    scheduleRender();
  }

  function drawEnd() {
    if (!isDrawing) return;
    finish();
  }

  // ── Pointer events (desktop / mouse) ─────────────────────────

  canvas.addEventListener('pointerdown', e => {
    if (!isDrawMode()) return;
    // On touch devices, let touch events handle drawing instead
    if (e.pointerType === 'touch' || e.pointerType === 'pen') return;
    e.preventDefault();
    drawStart(e, false);
  }, { passive: false });
  canvas.addEventListener('pointermove', e => {
    if (!isDrawMode() || !isDrawing) return;
    if (e.pointerType === 'touch' || e.pointerType === 'pen') return;
    e.preventDefault();
    drawMove(e);
  }, { passive: false });
  canvas.addEventListener('pointerup', e => {
    if (e.pointerType === 'touch' || e.pointerType === 'pen') return;
    drawEnd();
  }, { passive: true });
  canvas.addEventListener('pointercancel', e => {
    if (e.pointerType === 'touch' || e.pointerType === 'pen') return;
    drawEnd();
  }, { passive: true });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  // Fit a single cubic bezier to a set of points using least-squares control point placement.
  // Returns {x0,y0, cx1,cy1, cx2,cy2, x1,y1}
  function fitCubic(pts) {
    const n = pts.length;
    const p0 = pts[0], p3 = pts[n-1];
    // Parameterise by chord length
    const t = [0];
    for (let i = 1; i < n; i++) {
      t.push(t[i-1] + Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y));
    }
    const L = t[n-1] || 1;
    for (let i = 0; i < n; i++) t[i] /= L;

    // Basis: B1(t)=3t(1-t)², B2(t)=3t²(1-t)
    let A11=0,A12=0,A22=0,bx1=0,by1=0,bx2=0,by2=0;
    for (let i = 0; i < n; i++) {
      const u=t[i], u2=u*u, u3=u2*u, v=1-u, v2=v*v;
      const b1=3*u*v2, b2=3*u2*v;
      const rx = pts[i].x - (v2*v*p0.x + u3*p3.x);
      const ry = pts[i].y - (v2*v*p0.y + u3*p3.y);
      A11+=b1*b1; A12+=b1*b2; A22+=b2*b2;
      bx1+=b1*rx; by1+=b1*ry; bx2+=b2*rx; by2+=b2*ry;
    }
    const det = A11*A22 - A12*A12;
    if (Math.abs(det) < 1e-6) {
      // Fallback: evenly spaced control points
      return { p0, cx1:{x:p0.x+(p3.x-p0.x)/3, y:p0.y+(p3.y-p0.y)/3},
               cx2:{x:p0.x+2*(p3.x-p0.x)/3, y:p0.y+2*(p3.y-p0.y)/3}, p3 };
    }
    const cx1 = { x:(bx1*A22-bx2*A12)/det, y:(by1*A22-by2*A12)/det };
    const cx2 = { x:(bx2*A11-bx1*A12)/det, y:(by2*A11-by1*A12)/det };
    // Clamp control points: prevent extreme curvature that causes visual artifacts
    // Max deviation from chord = 60% of chord length
    const chordLen = Math.hypot(p3.x - p0.x, p3.y - p0.y) || 1;
    const maxDev = chordLen * 0.6;
    const midX = (p0.x + p3.x) / 2, midY = (p0.y + p3.y) / 2;
    for (const cp of [cx1, cx2]) {
      const dx = cp.x - midX, dy = cp.y - midY;
      const d = Math.hypot(dx, dy);
      if (d > maxDev) {
        const s = maxDev / d;
        cp.x = midX + dx * s;
        cp.y = midY + dy * s;
      }
    }
    return { p0, cx1, cx2, p3 };
  }

  // Draw a tapered filled stroke — same bell-curve stamping as the tie renderer.
  // When slur=true (smoothing on), fits a cubic bezier first and samples that.
  function drawTaperedStroke(ctx, pts, lw, smooth, col) {
    if (pts.length < 2) return;
    // maxR in CSS px — match the tie's visual weight (tie uses LS*0.14 logical = same scale)
    const maxR = cssW / LW * LS * 0.14;
    const endR = maxR * 0.45;
    const STEP = maxR * 0.6;  // spacing between stamped circles — must be < 2*endR to overlap

    // Produce a dense list of evenly-spaced points along the path
    let path;
    if (smooth && pts.length >= 4) {
      const {p0, cx1, cx2, p3} = fitCubic(pts);
      const approxLen = Math.hypot(p3.x-p0.x, p3.y-p0.y) * 1.5;
      const steps = Math.max(60, Math.round(approxLen / STEP));
      path = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps, mt = 1 - t;
        path.push({
          x: mt*mt*mt*p0.x + 3*mt*mt*t*cx1.x + 3*mt*t*t*cx2.x + t*t*t*p3.x,
          y: mt*mt*mt*p0.y + 3*mt*mt*t*cx1.y + 3*mt*t*t*cx2.y + t*t*t*p3.y,
        });
      }
    } else {
      // Densify raw points so no gap exceeds STEP
      path = [pts[0]];
      for (let i = 1; i < pts.length; i++) {
        const ax = pts[i-1].x, ay = pts[i-1].y;
        const bx = pts[i].x,   by = pts[i].y;
        const d = Math.hypot(bx-ax, by-ay);
        if (d > STEP) {
          const n = Math.ceil(d / STEP);
          for (let k = 1; k < n; k++) path.push({x: ax+(bx-ax)*k/n, y: ay+(by-ay)*k/n});
        }
        path.push(pts[i]);
      }
    }

    const n = path.length;
    if (n < 2) return;
    ctx.save();
    ctx.fillStyle = col || INK;
    for (let i = 0; i < n; i++) {
      const t = i / (n - 1);
      const s = 4 * t * (1 - t);   // bell: 0→1→0
      const r = endR + s * (maxR - endR);
      ctx.beginPath();
      ctx.arc(path[i].x, path[i].y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSlur(ctx, pts, lw, col) {
    if (pts.length < 2) return;
    ctx.save();
    ctx.strokeStyle = col || INK;
    ctx.lineWidth   = lw;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    if (pts.length < 4) {
      ctx.moveTo(pts[0].x, pts[0].y);
      ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    } else {
      const {p0, cx1, cx2, p3} = fitCubic(pts);
      ctx.moveTo(p0.x, p0.y);
      ctx.bezierCurveTo(cx1.x, cx1.y, cx2.x, cx2.y, p3.x, p3.y);
    }
    ctx.stroke();
    ctx.restore();
  }

  function finish() {
    if (currentPts.length >= 2) { // need at least 2 points for a visible stroke
      // Capture snapshot BEFORE adding stroke — but defer the expensive deep copy
      // Save a lightweight reference; the full snapshot is taken on next idle frame
      const preStrokeSnap = {
        notes: notes.map(n=>({...n})),
        stems: stems.map(s=>({...s})),
        barlines: barlines.map(b=>({...b})),
        clefs: clefs.map(c=>({...c})),
        beams: beams.map(b=>({...b})),
        flags: flags.map(f=>({...f})),
        ties: ties.map(t=>{ const{_geo,...rest}=t; return rest; }),
        hairpins: hairpins.map(h=>({...h})),
        rests: rests.map(r=>({...r})),
        keySigs: keySigs.map(k=>({...k})),
        textLabels: textLabels.map(t=>({...t})),
        fdStrokes: strokes.map(s=>({...s, pts: s.pts})), // shallow copy pts — they're immutable once committed
      };
      history.push(preStrokeSnap);
      if(history.length > 100) history.shift();
      redoStack = [];

      const isSlur = window.penSmooth || mode === 'slur';
      let pts = currentPts;
      if (showGrid && pts.length >= 3) {
        const p0 = pts[0], pN = pts[pts.length-1];
        const dx = pN.x - p0.x, dy = pN.y - p0.y;
        const len = Math.hypot(dx, dy);
        if (len > 1) {
          let maxDev = 0;
          for (const p of pts) {
            const dev = Math.abs((p.x - p0.x)*dy - (p.y - p0.y)*dx) / len;
            if (dev > maxDev) maxDev = dev;
          }
          if (maxDev / len < 0.08) pts = [p0, pN];
        }
      }
      const stroke = { pts, lineWidth: lineWidth(), slur: isSlur, slurTie: mode === 'slur', color: window.penColor || INK, hasPressure, refW: cssW };
      strokes.push(stroke);
    }
    isDrawing  = false;
    activePtr  = null;
    currentPts = [];
    dirty = true;
    scheduleRender();
  }

  // ── Render ───────────────────────────────────────────────────

  function scheduleRender() {
    if (!rafId) rafId = requestAnimationFrame(frame);
  }

  function frame() {
    rafId = null;
    if (dirty || isDrawing) {
      dirty = false;
      redrawAll();
    }
    // Keep loop alive while a stroke is in progress so every pointermove triggers a repaint
    if (isDrawing) rafId = requestAnimationFrame(frame);
  }

  function redrawAll() {
    // Clear with DPR-aware identity transform
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    // Scale context: canvas physical px → CSS px
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // Draw committed strokes
    for (const s of strokes) {
      const sc = s.color || INK;
      // Scale strokes to current zoom: ratio of current cssW to stroke's reference width
      const zs = s.refW ? cssW / s.refW : 1;
      const scaledPts = zs === 1 ? s.pts : s.pts.map(p => ({...p, x: p.x * zs, y: p.y * zs}));
      const scaledLw = s.lineWidth * zs;
      if (s.slurTie) { drawTaperedStroke(ctx, scaledPts, scaledLw, s.slur, sc); continue; }
      if (s.dashed) { ctx.setLineDash([(s.dashSeg||4)*zs, (s.dashGap||3)*zs]); }
      if (s.slur) drawSlur(ctx, scaledPts, scaledLw, sc);
      else drawStroke(ctx, scaledPts, scaledLw, sc, s.hasPressure);
      if (s.dashed) { ctx.setLineDash([]); }
    }

    // Draw in-progress stroke
    if (isDrawing && currentPts.length >= 1) {
      const pc = window.penColor || INK;
      if (mode === 'slur') drawTaperedStroke(ctx, currentPts, lineWidth(), window.penSmooth, pc);
      else if (window.penSmooth) drawSlur(ctx, currentPts, lineWidth(), pc);
      else drawStroke(ctx, currentPts, lineWidth(), pc, hasPressure);
    }

    ctx.restore();
  }

  /**
   * Quadratic Bezier midpoint smoothing.
   * Each recorded point is a control point; the curve passes through
   * the midpoints between consecutive control points. C¹ continuous,
   * no configuration needed.
   */
  function drawStroke(ctx, pts, lw, col, usePressure) {
    if (pts.length === 0) return;

    // If Pencil with pressure data, adjust line width by average pressure
    // Always use smooth bezier path — never circle stamping
    if (usePressure && pts.length > 1 && pts[0].pressure !== undefined) {
      const avgP = pts.reduce((s,p) => s + (p.pressure||0.5), 0) / pts.length;
      lw = lw * (1.0 + avgP * 0.4);
    }

    ctx.save();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = col || INK;
    ctx.fillStyle   = col || INK;
    ctx.lineWidth   = lw;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    if (pts.length === 1) {
      ctx.beginPath();
      ctx.arc(pts[0].x, pts[0].y, lw / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }

    // Multi-pass smoothing: 3 passes of weighted averaging for silky curves
    let sp = pts;
    if (pts.length > 4) {
      for (let pass = 0; pass < 3; pass++) {
        const next = [sp[0]];
        for (let i = 1; i < sp.length - 1; i++) {
          next.push({
            x: sp[i-1].x * 0.15 + sp[i].x * 0.7 + sp[i+1].x * 0.15,
            y: sp[i-1].y * 0.15 + sp[i].y * 0.7 + sp[i+1].y * 0.15,
          });
        }
        next.push(sp[sp.length - 1]);
        sp = next;
      }
    }

    ctx.beginPath();
    ctx.moveTo(sp[0].x, sp[0].y);

    if (sp.length === 2) {
      ctx.lineTo(sp[1].x, sp[1].y);
    } else if (sp.length === 3) {
      ctx.quadraticCurveTo(sp[1].x, sp[1].y, sp[2].x, sp[2].y);
    } else {
      // Catmull-Rom to cubic bezier for buttery smooth curves
      // First segment: quadratic to first midpoint
      const mid0 = { x: (sp[0].x + sp[1].x) / 2, y: (sp[0].y + sp[1].y) / 2 };
      ctx.quadraticCurveTo(sp[0].x, sp[0].y, mid0.x, mid0.y);

      for (let i = 1; i < sp.length - 2; i++) {
        const p0 = sp[i], p1 = sp[i + 1];
        const mid = { x: (p0.x + p1.x) / 2, y: (p0.y + p1.y) / 2 };
        ctx.quadraticCurveTo(p0.x, p0.y, mid.x, mid.y);
      }

      // Last segment: quadratic to endpoint
      const last = sp[sp.length - 1];
      const prev = sp[sp.length - 2];
      ctx.quadraticCurveTo(prev.x, prev.y, last.x, last.y);
    }

    ctx.stroke();
    ctx.restore();
  }

  // Redraw a single stroke in a specified color (for selection highlighting)
  function redrawStroke(s, col) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const zs = s.refW ? cssW / s.refW : 1;
    const pts = zs === 1 ? s.pts : s.pts.map(p => ({...p, x: p.x * zs, y: p.y * zs}));
    const lw = s.lineWidth * zs;
    if (s.slurTie) {
      drawTaperedStroke(ctx, pts, lw, s.slur, col);
      ctx.restore();
      return;
    }
    if (s.dashed) { ctx.setLineDash([(s.dashSeg||4)*zs, (s.dashGap||3)*zs]); }
    if (s.slur) {
      ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      if (pts.length >= 4) {
        const {p0,cx1,cx2,p3} = fitCubic(pts);
        ctx.beginPath(); ctx.moveTo(p0.x,p0.y);
        ctx.bezierCurveTo(cx1.x,cx1.y,cx2.x,cx2.y,p3.x,p3.y);
      } else {
        ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
        ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
      }
      ctx.stroke();
    } else {
      drawStroke(ctx, pts, lw, col, s.hasPressure);
    }
    if (s.dashed) { ctx.setLineDash([]); }
    ctx.restore();
  }

  function undoLast() {
    if (strokes.length > 0) {
      strokes.pop();
      dirty = true;
      scheduleRender();
    }
  }

  // Restore strokes array to a previously snapshotted state
  function restoreStrokes(saved) {
    strokes = saved.map(s=>({...s, pts: s.pts.map(p=>({...p}))}));
    dirty = true;
    scheduleRender();
  }

  function getStrokes() {
    return strokes.map(s=>({...s, pts: s.pts.map(p=>({...p}))}));
  }

  // Partially erase strokes passing within radius of (x,y).
  // Points inside the radius are removed; surviving contiguous runs become new strokes.
  function eraseAt(lx, ly) {
    const scale = cssW / LW;
    const cx2 = lx * scale, cy2 = ly * scale;
    const r = LS * scale * 1.0;

    // Distance from point (px,py) to segment (ax,ay)→(bx,by)
    function distToSeg(px, py, ax, ay, bx, by) {
      const dx=bx-ax, dy=by-ay, len2=dx*dx+dy*dy;
      if(len2 < 1e-6) return Math.hypot(px-ax, py-ay);
      const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/len2));
      return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
    }

    // Densify a stroke so no segment is longer than r/2,
    // ensuring the erase circle always hits enough points to split cleanly
    function densify(pts) {
      if(pts.length < 2) return pts;
      const step = r / 2;
      const out = [pts[0]];
      for(let i=1;i<pts.length;i++){
        const ax=pts[i-1].x, ay=pts[i-1].y;
        const bx=pts[i].x,   by=pts[i].y;
        const d = Math.hypot(bx-ax, by-ay);
        if(d > step){
          const n = Math.ceil(d/step);
          for(let k=1;k<n;k++) out.push({x:ax+(bx-ax)*k/n, y:ay+(by-ay)*k/n});
        }
        out.push(pts[i]);
      }
      return out;
    }

    let changed = false;
    const next = [];
    for(const s of strokes){
      // Scale stroke points to current zoom for hit-testing
      const zs = s.refW ? cssW / s.refW : 1;
      const zpts = zs === 1 ? s.pts : s.pts.map(p=>({...p, x:p.x*zs, y:p.y*zs}));
      // Check if eraser is anywhere near this stroke first
      const near = zpts.some((p,i) =>
        Math.hypot(p.x-cx2,p.y-cy2) < r*4 ||
        (i<zpts.length-1 && distToSeg(cx2,cy2,p.x,p.y,zpts[i+1].x,zpts[i+1].y) < r*4)
      );
      if(!near){ next.push(s); continue; }

      const pts = densify(zpts);
      const keep = pts.map(p => Math.hypot(p.x-cx2, p.y-cy2) >= r);
      if(keep.every(k=>k)){ next.push(s); continue; }
      changed = true;
      let run = [];
      // Unscale surviving points back to original coordinates
      const invZs = zs === 1 ? 1 : 1/zs;
      for(let i=0;i<pts.length;i++){
        if(keep[i]){
          run.push(invZs === 1 ? pts[i] : {...pts[i], x:pts[i].x*invZs, y:pts[i].y*invZs});
        } else {
          if(run.length >= 2) next.push({...s, pts:run});
          run = [];
        }
      }
      if(run.length >= 2) next.push({...s, pts:run});
    }
    if(changed){ strokes=next; dirty=true; scheduleRender(); return true; }
    return false;
  }

  function clear() {
    strokes    = [];
    currentPts = [];
    dirty = true;
    scheduleRender();
  }

  // Move a stroke by (dx, dy) in CSS px
  function moveStroke(idx, dx, dy) {
    if(!strokes[idx]) return;
    strokes[idx].pts = strokes[idx].pts.map(p=>({x:p.x+dx, y:p.y+dy}));
    dirty = true;
    scheduleRender();
  }

  // Warp a stroke endpoint: move pts[end] by (dx,dy) CSS px, interpolate rest by t
  function warpStrokeEnd(idx, end, dx, dy, origPts) {
    if(!strokes[idx]) return;
    const n = origPts.length;
    strokes[idx].pts = origPts.map((p, i) => {
      // t=1 at the dragged end, t=0 at the fixed end
      const t = end==='first' ? 1 - i/(n-1) : i/(n-1);
      return { x: p.x + dx*t, y: p.y + dy*t };
    });
    dirty = true;
    scheduleRender();
  }

  // ── Wire events on the overlay canvas ──────────────────────────

  // Pass-through mouse events to notation canvas when not in draw mode
  canvas.addEventListener('mousedown', e => {
    if (!isDrawMode()) {
      _isPenInput = false;
      if(_radialOpen){ _radialCommit(e.clientX, e.clientY); return; }
      const{x,y}=logicalPos(e);
      if(isNoteMode()){
        const si = findStaff(y);
        if(si >= 0 && x >= minX && x <= maxX){
          if(_radialStartTimer(x, y, e.clientX, e.clientY)) return;
        }
      }
      notationDown(x,y);
    }
  });
  canvas.addEventListener('mousemove', e => {
    if (!isDrawMode()) {
      _radialCheckMove(e.clientX, e.clientY);
      if(_radialOpen || _radialTimer) return;
      _isMouseMove = true;
      const{x,y}=logicalPos(e);notationMove(x,y);
      _isMouseMove = false;
    }
  });
  canvas.addEventListener('mouseup', e => {
    if (!isDrawMode()) {
      if(_radialOpen){ _radialCommit(e.clientX, e.clientY); return; }
      if(_radialTimer && _radialPressPos){
        _radialCancelTimer();
        const {x, y} = _radialPressPos;
        _radialPressPos = null;
        notationDown(x, y);
        notationUp(x, y);
        return;
      }
      _radialCancelTimer();
      const{x,y}=logicalPos(e);notationUp(x,y);
    }
  });
  canvas.addEventListener('dblclick', e => {
    if (!isDrawMode()) {
      const{x,y}=logicalPos(e);if(mode!=='scrub')playChordAt(x,y);
    }
  });
  canvas.addEventListener('mouseleave', () => {
    if (!isDrawMode()) {
      eraseHeld=false;
      if(mode==='scrub'){scrubX=null;scrubY=null;}
      if(stemDragging){stemDragging=false;stemStart=null;stemCurrent=null;}
      if(rectSelecting){rectSelecting=false;rectSelStart=null;beamGhostEnd=null;}
      if(isNoteMode()){ghost=null;alignGuide=null;}
      render();
    }
  });
  // Detect pen vs touch for notation
  canvas.addEventListener('pointerdown', e => {
    if (!isDrawMode()) _isPenInput = (e.pointerType === 'pen');
  }, { passive: true });
  // Touch events: handle BOTH drawing and notation passthrough
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if(e.target !== canvas) return; // not our touch — let it reach cv
    e.stopPropagation(); // prevent cv from also handling this touch
    if (isDrawMode()) {
      const t = e.touches[0];
      const isPen = t && t.touchType === 'stylus';
      if (isPen){ _pencilDetected = true; try{localStorage.setItem('pencilDetected','1');}catch(e){} }
      if (_pencilDetected && !isPen) return;
      drawStart(e, isPen);
    } else {
      const t0 = e.touches[0];
      if(t0 && t0.touchType === 'stylus'){ _pencilDetected = true; _isPenInput = true; try{localStorage.setItem('pencilDetected','1');}catch(e){} }
      const fingerAllowedModes = ['select','lasso','scrub','erase','none'];
      if(_pencilDetected && t0 && t0.touchType !== 'stylus' && !fingerAllowedModes.includes(mode)) return;
      if(_radialOpen && t0){ _radialCommit(t0.clientX, t0.clientY); return; }
      if(mode==='none'){ document.querySelector('[data-mode="select"]').click(); return; }
      const{x,y}=logicalPos(e);
      if(isNoteMode() && t0){
        const si = findStaff(y);
        if(si >= 0 && x >= minX && x <= maxX){
          // Show ghost note and alignment guide immediately on pencil/touch down
          const sl = yToSlot(y, si);
          // Compute snap target for alignment guide
          let snapToX = null, bestDist = SNAP_R * 0.4;
          notes.forEach(n=>{
            if(n.si!==si) return;
            if(n.slot===sl) return;
            const nx=renderedNoteX(n);
            const d=Math.abs(nx-x);
            if(d<bestDist){ bestDist=d; snapToX=nx; }
          });
          rests.forEach(r=>{
            if(r.si!==si) return;
            const d=Math.abs(r.x-x);
            if(d<bestDist){ bestDist=d; snapToX=r.x; }
          });
          // Check connected staves
          let guideS1=si, guideS2=si;
          barlines.forEach(b=>{
            if(b.s1<=si&&si<=b.s2){
              for(let s=b.s1;s<=b.s2;s++){
                if(s!==si){
                  notes.forEach(n=>{ if(n.si===s){ const nx=renderedNoteX(n); const d=Math.abs(nx-x); if(d<bestDist){bestDist=d;snapToX=nx;} } });
                  rests.forEach(r=>{ if(r.si===s){ const d=Math.abs(r.x-x); if(d<bestDist){bestDist=d;snapToX=r.x;} } });
                }
              }
              guideS1=Math.min(guideS1,b.s1);
              guideS2=Math.max(guideS2,b.s2);
            }
          });
          const SOFT_SNAP_R = SNAP_R * 0.3;
          const snappedX = (snapToX!==null && Math.abs(x - snapToX) < SOFT_SNAP_R) ? snapToX : snapX(x);
          alignGuide = snapToX!==null ? {
            x: snapToX,
            y1: stTop(guideS1) - LS*4,
            y2: stTop(guideS2) + SH + LS*4,
          } : null;
          ghost = {x:snappedX, slot:sl, si, head:headFromMode(), acc:accFromMode(), dot:dotFromMode()};
          render();
          if(_radialStartTimer(x, y, t0.clientX, t0.clientY)){
            return;
          }
        }
      }
      notationDown(x,y);
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    e.stopPropagation();
    if (isDrawMode()) {
      if (_pencilDetected && e.touches[0] && e.touches[0].touchType !== 'stylus' && !isDrawing) return;
      drawMove(e);
    } else {
      const t0=e.touches[0];
      const hadRadialTimer = !!_radialTimer;
      if(t0) _radialCheckMove(t0.clientX, t0.clientY);
      if(_radialOpen) return;
      // Radial timer was just cancelled by movement — start deferred note placement
      if(hadRadialTimer && !_radialTimer && isNoteMode() && !_penNoteDeferred){
        _radialPressPos = null;
        const{x,y}=logicalPos(e);
        notationDown(x,y);
        return;
      }
      if(_radialTimer && !isNoteMode()) return;
      const{x,y}=logicalPos(e); notationMove(x,y);
    }
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    e.stopPropagation();
    if (isDrawMode()) {
      drawEnd();
    } else {
      const src=e.changedTouches[0];
      if(_radialOpen && src){ _radialCommit(src.clientX, src.clientY); ghost=null;alignGuide=null;render(); return; }
      if(_radialTimer && _radialPressPos){
        _radialCancelTimer();
        const {x, y} = _radialPressPos;
        _radialPressPos = null;
        notationDown(x, y);
        notationUp(x, y);
        ghost=null; alignGuide=null; render();
        return;
      }
      _radialCancelTimer();
      const{x,y}=logicalPos(e); notationUp(x,y); ghost=null; alignGuide=null; render();
    }
  }, { passive: false });
  canvas.addEventListener('touchcancel', () => {
    if (isDrawMode()) {
      drawEnd();
    } else {

function isDrawMode() { return mode === 'draw-fine' || mode === 'draw-medium' || mode === 'draw-bold' || mode === 'slur'; }

// logicalPos also works for the overlay canvas since they're the same CSS size
// (reuse the function defined above against cv's bounding rect)

function updateAccidentalState(){
  const headSelected = document.querySelector('[data-head].on') !== null;
  const noteSelected = mode==='select' && sel && sel.type==='note';
  const restSelected = mode==='select' && sel && sel.type==='rest';
  const inRestMode = mode==='rest';
  const accEnabled = headSelected || noteSelected;
  document.querySelectorAll('[data-acc]').forEach(b=>{
    b.classList.toggle('disabled', !accEnabled);
    if(!accEnabled){ b.classList.remove('on'); noteAcc='none'; }
  });
  const dotBtn = document.getElementById('dotBtn');
  const dotEnabled = accEnabled || inRestMode || restSelected;
  dotBtn.classList.toggle('disabled', !dotEnabled);
  if(!dotEnabled){ dotBtn.classList.remove('on'); noteDot=false; }
  // If a note is selected, reflect its current head, accidental and dot on the toolbar
  if(noteSelected){
    const n = notes.find(n=>n.id===sel.id);
    const acc = n ? (n.acc||'none') : 'none';
    document.querySelectorAll('[data-acc]').forEach(b=>{
      b.classList.toggle('on', b.dataset.acc===acc);
    });
    dotBtn.classList.toggle('on', !!(n && n.dot));
    // Reflect head type
    document.querySelectorAll('[data-head]').forEach(b=>{
      b.classList.toggle('on', !!(n && b.dataset.head===n.head));
    });
  } else if(!isNoteMode()){
    // No note selected and not in note entry mode — clear head highlights
    document.querySelectorAll('[data-head]').forEach(b=>b.classList.remove('on'));
  }
  // If a rest is selected, reflect its dot state on the toolbar
  if(restSelected){
    const r = rests.find(r=>r.id===sel.id);
    dotBtn.classList.toggle('on', !!(r && r.dot));
  }
  // Show alignment guide for selected note or rest against connected staves
  if((noteSelected || restSelected) && !ghost){
    const obj = noteSelected ? notes.find(n=>n.id===sel.id) : rests.find(r=>r.id===sel.id);
    if(obj){
      const nx = noteSelected ? renderedNoteX(obj) : obj.x;
      const si = obj.si;
      let guideS1=si, guideS2=si, hasConnected=false;
      barlines.forEach(b=>{
        if(b.s1<=si&&si<=b.s2&&b.s1!==b.s2){
          guideS1=Math.min(guideS1,b.s1);
          guideS2=Math.max(guideS2,b.s2);
          hasConnected=true;
        }
      });
      alignGuide = hasConnected ? {x:nx, y1:stTop(guideS1)-LS*4, y2:stTop(guideS2)+SH+LS*4} : null;
    } else { alignGuide=null; }
  } else if(!noteSelected && !restSelected && mode==='select'){
    // Clear guide when deselected in select mode (note mode manages its own)
    if(!ghost) alignGuide=null;
  }
}

// Head buttons — independent selection, switches to note mode
document.querySelectorAll('[data-head]').forEach(b=>b.addEventListener('click',()=>{
  const wasOn = b.classList.contains('on');
  // If a note is selected, change its head type without switching modes
  if(mode==='select' && sel && sel.type==='note'){
    const n = notes.find(n=>n.id===sel.id);
    if(n){
      historyPush();
      n.head = b.dataset.head;
      // Reflect in toolbar
      document.querySelectorAll('[data-head]').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');

      render(); return;
    }
  }

  document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));
  if(wasOn){

    mode='none';

    fd.canvas.style.pointerEvents='none';

// Accidental buttons — toggle: click selected one to deselect (back to none)
document.querySelectorAll('[data-acc]').forEach(b=>b.addEventListener('click',()=>{
  const wasOn = b.classList.contains('on');
  document.querySelectorAll('[data-acc]').forEach(x=>x.classList.remove('on'));
  const newAcc = wasOn ? 'none' : b.dataset.acc;
  if(!wasOn) b.classList.add('on');
  noteAcc = newAcc;

  // If a note is selected in select mode, apply accidental directly to it
  if(mode==='select' && sel && sel.type==='note'){
    const n = notes.find(n=>n.id===sel.id);
    if(n){
      historyPush();
      n.acc = newAcc;
      // Clear any manual accidental offset so it re-auto-positions
      delete n.accXOff;
      syncTiedAccidentals();
      render();
    }
    return;
  }

  switchToNoteMode();
  render();
}));

// Dot button — toggle augmentation dot; applies directly to selected note
document.getElementById('dotBtn').addEventListener('click', ()=>{
  const btn = document.getElementById('dotBtn');
  if(btn.classList.contains('disabled')) return;
  const wasOn = btn.classList.contains('on');
  btn.classList.toggle('on', !wasOn);
  noteDot = !wasOn;

  // If a note is selected in select mode, apply dot directly to it
  if(mode==='select' && sel && sel.type==='note'){
    const n = notes.find(n=>n.id===sel.id);
    if(n){ historyPush(); n.dot = !wasOn; render(); }
    return;
  }

  // If a rest is selected in select mode, apply dot directly to it
  if(mode==='select' && sel && sel.type==='rest'){
    const r = rests.find(r=>r.id===sel.id);
    if(r){ historyPush(); r.dot = !wasOn; render(); }
    return;
  }

  // If in rest mode, just toggle the dot state (it'll be applied on next placement)
  if(mode==='rest'){ render(); return; }

  switchToNoteMode();
  render();
});

const AUTOSAVE_KEY = 'mskp_autosave';
const FILE_VERSION = 1;

function buildSaveData(){
  // Save current page's working state into the pages array first
  saveCurrentPage();
  return {
    version: FILE_VERSION,
    timestamp: new Date().toISOString(),
    ids: { nid, sid, blid, clid, hpid, rid, ksid, tlid, tieid, beamid, flagid },
    currentPage,
    pages: pages.map(pg => pg.snap || emptyPageSnap()),
  };
}

function restoreSaveData(data){
  if(!data || typeof data !== 'object') return false;
  // Restore ID counters
  if(data.ids){
    nid    = data.ids.nid    || 0;
    sid    = data.ids.sid    || 0;
    blid   = data.ids.blid   || 0;
    clid   = data.ids.clid   || 0;
    hpid   = data.ids.hpid   || 0;
    rid    = data.ids.rid    || 0;
    ksid   = data.ids.ksid   || 0;
    tlid   = data.ids.tlid   || 0;
    tieid  = data.ids.tieid  || 0;
    beamid = data.ids.beamid || 0;
    flagid = data.ids.flagid || 0;
  } else {
    const maxId = arr => arr.reduce((mx,o) => Math.max(mx, o.id||0), 0) + 1;
    // For legacy single-page files, compute from the top-level arrays
    const src = data.pages ? data.pages[0] || {} : data;
    nid    = maxId(src.notes||[]);
    sid    = maxId(src.stems||[]);
    blid   = maxId(src.barlines||[]);
    clid   = maxId(src.clefs||[]);
    hpid   = maxId(src.hairpins||[]);
    rid    = maxId(src.rests||[]);
    ksid   = maxId(src.keySigs||[]);
    tlid   = maxId(src.textLabels||[]);
    tieid  = maxId(src.ties||[]);
    beamid = maxId(src.beams||[]);
    flagid = maxId(src.flags||[]);
  }

  // Multi-page or legacy single-page
  if(data.pages && data.pages.length){
    pages = data.pages.map(snap => ({ snap, history:[], redoStack:[] }));
    currentPage = Math.min(data.currentPage || 0, pages.length - 1);
  } else {
    // Legacy single-page file: top-level arrays are the page data
    const snap = {
      notes: data.notes||[], stems: data.stems||[], barlines: data.barlines||[],
      clefs: data.clefs||[], beams: data.beams||[], flags: data.flags||[],
      ties: data.ties||[], hairpins: data.hairpins||[], rests: data.rests||[],
      keySigs: data.keySigs||[], textLabels: data.textLabels||[],
      fdStrokes: data.fdStrokes||[],
    };
    pages = [{ snap, history:[], redoStack:[] }];
    currentPage = 0;
  }
  loadPage(currentPage);
  updatePageBar();
  // Reset interaction state
  sel=null; selSet=[]; selDragging=false; selDragOrig=null; selDragStart=null;
  ghost=null; alignGuide=null;
  render();
  return true;
}

(()=>{

    menu.style.left = '0';
    menu.style.top = '0';

    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    const left = Math.max(8, Math.min(r.left, window.innerWidth - mw - 8));
    const top = (r.bottom + 2 + mh > window.innerHeight)
      ? Math.max(8, r.top - mh - 2)
      : r.bottom + 2;
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  }

  btn.addEventListener('click', ()=>{

    showMenu();
  });

  document.addEventListener('mousedown', e=>{
    if(menu.classList.contains('show') && !menu.contains(e.target) && !btn.contains(e.target)) hideMenu();

  const toggleIds = new Set(['themeBtn','watermarkBtn','accCarryBtn','pngBtn']);

document.getElementById('saveBtn').addEventListener('click',()=>{
  const data = buildSaveData();
  const json = JSON.stringify(data);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  // Generate a filename with date
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const datePart = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  const timePart = pad(now.getHours())+pad(now.getMinutes());
  a.href     = url;
  a.download = 'sketch_'+datePart+'_'+timePart+'.cnb';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

  if(_autoSaveTimer) clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(()=>{
    try {
      const data = buildSaveData();
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
    } catch(e){ /* localStorage full or unavailable — silently ignore */ }
  }, 1000);
}

// Delete/Backspace — erase the currently selected item
function deleteSelected(){
  if(!sel && !selSet.length) return false;
  historyPush();
  // Lasso multi-selection
  if(selSet.length){
    selSet.forEach(({type,id})=>{
      if(type==='note'){
        const delStem=stems.find(s=>s.noteId===id);
        if(delStem) repointBeamsAwayFrom(delStem.id);
        notes=notes.filter(n=>n.id!==id);
        stems=stems.filter(s=>s.noteId!==id);
        ties=ties.filter(t=>t.noteId1!==id&&t.noteId2!==id);
      } else if(type==='stem'){
        repointBeamsAwayFrom(id);
        stems=stems.filter(s=>s.id!==id);
        beams=beams.filter(b=>b.stemId1!==id&&b.stemId2!==id);
        flags=flags.filter(f=>f.stemId!==id);
      } else if(type==='barline'){
        barlines=barlines.filter(b=>b.id!==id);
      } else if(type==='clef'){
        clefs=clefs.filter(c=>c.id!==id);
      } else if(type==='hairpin'){
        hairpins=hairpins.filter(h=>h.id!==id);
      } else if(type==='rest'){
        rests=rests.filter(r=>r.id!==id);
      } else if(type==='keysig'){
        keySigs=keySigs.filter(k=>k.id!==id);
      } else if(type==='textLabel'){
        textLabels=textLabels.filter(t=>t.id!==id);
      } else if(type==='tie'){
        ties=ties.filter(t=>t.id!==id);
      }
    });
    // Remove strokes by index descending so splices don't shift indices
    const strokeIds=selSet.filter(s=>s.type==='stroke').map(s=>s.id);
    if(strokeIds.length){
      const all=fd.getStrokes();
      [...strokeIds].sort((a,b)=>b-a).forEach(i=>all.splice(i,1));
      fd.restoreStrokes(all);
    }
    beams=beams.filter(b=>{
      const s1=stems.find(s=>s.id===b.stemId1),s2=stems.find(s=>s.id===b.stemId2);
      return s1&&s2;
    });
    flags=flags.filter(f=>stems.some(s=>s.id===f.stemId));
    ties=ties.filter(t=>notes.some(n=>n.id===t.noteId1)&&notes.some(n=>n.id===t.noteId2));
  } else if(sel){
    if(sel.type==='note'){
      // Re-point beams before removing the stem so the rest of the group stays beamed
      const delStem=stems.find(s=>s.noteId===sel.id);
      if(delStem) repointBeamsAwayFrom(delStem.id);
      notes=notes.filter(n=>n.id!==sel.id);
      stems=stems.filter(s=>s.noteId!==sel.id);
      ties=ties.filter(t=>t.noteId1!==sel.id&&t.noteId2!==sel.id);
      beams=beams.filter(b=>{
        const s1=stems.find(s=>s.id===b.stemId1),s2=stems.find(s=>s.id===b.stemId2);
        return s1&&s2;
      });
      flags=flags.filter(f=>stems.some(s=>s.id===f.stemId));
    } else if(sel.type==='accidental'){
      const n=notes.find(n=>n.id===sel.id);
      if(n){ n.acc='none'; delete n.accXOff; }
    } else if(sel.type==='stem'||sel.type==='stemTip'){
      repointBeamsAwayFrom(sel.id);
      stems=stems.filter(s=>s.id!==sel.id);
      beams=beams.filter(b=>{
        const s1=stems.find(s=>s.id===b.stemId1),s2=stems.find(s=>s.id===b.stemId2);
        return s1&&s2;
      });
      flags=flags.filter(f=>f.stemId!==sel.id);
    } else if(sel.type==='beam'){
      // Delete all beams that share this beam's stem group
      const b=beams.find(b=>b.id===sel.id);
      if(b){
        const bs1=stems.find(s=>s.id===b.stemId1);
        const bs2=stems.find(s=>s.id===b.stemId2);
        const memberIds=new Set((bs1&&bs2)?beamMembers(bs1,bs2).map(s=>s.id):[]);
        beams=beams.filter(bb=>{
          if((bb.layer||0)!==0){
            // Remove child beams whose stems are in this group
            return !memberIds.has(bb.stemId1)&&!memberIds.has(bb.stemId2);
          }
          return bb.id!==sel.id;
        });
      }
    } else if(sel.type==='barline'||sel.type==='barlineEnd'){
      barlines=barlines.filter(b=>b.id!==sel.id);
    } else if(sel.type==='clef'){
      clefs=clefs.filter(c=>c.id!==sel.id);
    } else if(sel.type==='hairpin'||sel.type==='hairpinEnd'){
      hairpins=hairpins.filter(h=>h.id!==sel.id);
    } else if(sel.type==='rest'){
      rests=rests.filter(r=>r.id!==sel.id);
    } else if(sel.type==='keysig'){
      keySigs=keySigs.filter(k=>k.id!==sel.id);
    } else if(sel.type==='textLabel'){
      textLabels=textLabels.filter(t=>t.id!==sel.id);
    } else if(sel.type==='tie'||sel.type==='tieEnd'){
      ties=ties.filter(t=>t.id!==sel.id);
    } else if(sel.type==='stroke'||sel.type==='strokeEnd'){
      const all=fd.getStrokes();
      all.splice(sel.id,1);
      fd.restoreStrokes(all);
    }
  }
  sel=null; selDragging=false; selDragOrig=null; selDragStart=null;
  selSet=[];
  return true;
}

window.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const mod = e.metaKey || e.ctrlKey;
  if(mod && e.key === 'c'){
    e.preventDefault();
    document.getElementById('copyBtn').click();
    return;
  }
  if(mod && e.key === 'v'){
    e.preventDefault();
    document.getElementById('pasteBtn').click();
    return;
  }
  if(mod && e.key === 's'){
    e.preventDefault();
    document.getElementById('saveBtn').click();
    return;
  }
  if(mod && e.key === 'o'){
    e.preventDefault();
    document.getElementById('loadBtn').click();
    return;
  }
  if(mod && e.key === 'z' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('undoBtn').click();
    return;
  }
  if(mod && e.key === 'z' && e.shiftKey){
    e.preventDefault();
    document.getElementById('redoBtn').click();
    return;
  }
  if(mod && e.key === 'r'){
    e.preventDefault();
    document.getElementById('redoBtn').click();
    return;
  }
  if(mod && e.key === 'a'){
    e.preventDefault();
    // Select all objects on current page
    selSet = [];
    notes.forEach(n => selSet.push({type:'note', id:n.id}));
    stems.forEach(s => selSet.push({type:'stem', id:s.id}));
    barlines.forEach(b => selSet.push({type:'barline', id:b.id}));
    clefs.forEach(c => selSet.push({type:'clef', id:c.id}));
    rests.forEach(r => selSet.push({type:'rest', id:r.id}));
    hairpins.forEach(h => selSet.push({type:'hairpin', id:h.id}));
    keySigs.forEach(k => selSet.push({type:'keysig', id:k.id}));
    ties.forEach(t => selSet.push({type:'tie', id:t.id}));
    textLabels.forEach(t => selSet.push({type:'textLabel', id:t.id}));
    const allStrokes = fd.getStrokes();
    for(let i = 0; i < allStrokes.length; i++) selSet.push({type:'stroke', id:i});
    sel = null;
    // Switch to select mode if not already
    if(mode !== 'select'){
      document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));
      document.querySelector('[data-mode="select"]').classList.add('on');
      mode = 'select';
      cv.style.cursor='default'; fd.canvas.style.cursor='default';
      fd.canvas.style.pointerEvents='none';
      updateAccidentalState(); updatePenControls();
    }
    render();
    return;
  }
  if(mod && e.key === 'p'){
    e.preventDefault();
    document.getElementById('pdfBtn').click();
    return;
  }
  // Arrow keys: move selected note up/down by one slot when a note is selected
  if((e.key === 'ArrowUp' || e.key === 'ArrowDown') && mode === 'select' && sel && sel.type === 'note' && !_isIPhone){
    e.preventDefault();
    const n = notes.find(n => n.id === sel.id);
    if(n){
      historyPush();
      const delta = e.key === 'ArrowUp' ? -1 : 1;
      n.slot = Math.max(MAX_LEDGER_SLOT_ABOVE, Math.min(MAX_LEDGER_SLOT_BELOW, n.slot + delta));
      pruneInvalidTies();
      syncTiedAccidentals();
      updateAccidentalState();
      // Audition the new pitch
      const groups = chordsOnStaff(notes.filter(nn => nn.si === n.si));
      const myGroup = groups.find(g => g.some(nn => nn.id === n.id)) || [n];
      playFreqs(myGroup.map(nn => slotToFreq(nn.slot, effectiveAccidental(nn), activeClefType(nn.si, nn.x))));
      render();
    }
    return;
  }
  if(e.key === 'ArrowLeft' && pages.length > 1){
    e.preventDefault();
    switchPage(currentPage - 1);
    return;
  }
  if(e.key === 'ArrowRight' && pages.length > 1){
    e.preventDefault();
    switchPage(currentPage + 1);
    return;
  }
  if(e.key === 'Escape'){
    e.preventDefault();
    // Deselect current tool
    document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('[data-head]').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('[data-acc]').forEach(x=>x.classList.remove('on'));
