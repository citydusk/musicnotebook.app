  function captureEvent(type, manualIdx, note, vel) {
    if (activeRecordingSlot < 0) return;
    const slot = activeRecordingSlot;
    if (!clips[slot]) clips[slot] = { events: [], duration: 0 };
    const t = nowMs() - recordingStartTime;
    clips[slot].events.push({ t, type, manualIdx, note, vel });
  }

  // Capture a sustain pedal change into the active recording. Sustain
  // is global (affects both manuals), so the event uses manualIdx: -1
  // and no note data. type='sustain', vel=1 means pedal-down, vel=0
  // means pedal-up.
  function captureSustain(on) {
    if (activeRecordingSlot < 0) return;
    const slot = activeRecordingSlot;
    if (!clips[slot]) clips[slot] = { events: [], duration: 0 };
    const t = nowMs() - recordingStartTime;
    clips[slot].events.push({ t, type: 'sustain', manualIdx: -1, note: null, vel: on ? 1 : 0 });
  }

  function setClipState(slot, state) {
    clipState[slot] = state;
    const btn = document.querySelector(`.clip-btn[data-slot="${slot}"]`);
    if (!btn) return;
    btn.classList.remove('recording', 'loaded', 'playing');
    if (state !== 'empty') btn.classList.add(state);
  }

  function startRecording(slot) {
    // If anything else is recording, stop it first
    if (activeRecordingSlot >= 0) stopRecording();
    activeRecordingSlot = slot;
    recordingStartTime = nowMs();
    clips[slot] = { events: [], duration: 0 };
    setClipState(slot, 'recording');
    // If sustain is already on when recording starts (e.g. locked),
    // capture a t=0 sustain-on event so playback starts in the right
    // state. Otherwise the recorded notes wouldn't sustain on playback.
    if (sustainOn) captureSustain(true);
  }

  function stopRecording() {
    if (activeRecordingSlot < 0) return;
    const slot = activeRecordingSlot;
    const clip = clips[slot];
    activeRecordingSlot = -1;
    if (!clip || clip.events.length === 0) {
      // Empty recording — go back to empty state, don't store nothing
      clips[slot] = null;
      setClipState(slot, 'empty');
      saveClips();
      return;
    }
    // Trim silence at both ends:
    //   head — shift all events so the first one happens at t=0
    //   tail — set duration to the last event's time (which is the
    //          actual last note-off, since noteOff is captured too).
    // Result: the clip starts immediately on play and ends right when
    // the last note finishes ringing, regardless of recording pauses.
    const firstT = clip.events[0].t;
    if (firstT > 0) {
      clip.events.forEach(ev => { ev.t -= firstT; });
    }
    const lastT = clip.events[clip.events.length - 1].t;
    clip.duration = lastT;
    setClipState(slot, 'loaded');
    saveClips();
  }

  function playClip(slot) {
    const clip = clips[slot];
    if (!clip) return;
    setClipState(slot, 'playing');
    // Track per-clip sustain so playback can hold notes on its own,
    // independent of the user's live pedal state. If sustain is on,
    // noteOffs go into pbSustained instead of triggering release.
    // When sustain turns off, those held notes are released.
    const pbSustainState = { on: false };
    const pbSustained = new Map();  // key "manualIdx:note" → {instName, manualIdx, note}

    function pbNoteOn(manualIdx, note, vel) {
      // If the pitch is currently being sustained from playback, release
      // the prior voice first so PolySynth doesn't allocate a duplicate
      // (mirrors the live re-articulation logic).
      const key = manualIdx + ':' + note;
      if (pbSustained.has(key)) {
        const { instName, note: n, manualIdx: m } = pbSustained.get(key);
        const inst = instruments[instName];
        if (inst) inst.triggerRelease(m, n);
        pbSustained.delete(key);
      }
      noteOn(manualIdx, note, 'pb-' + slot + '-' + note, vel);
    }
    function pbNoteOff(manualIdx, note) {
      const tid = 'pb-' + slot + '-' + note;
      if (pbSustainState.on) {
        // Hold the note: store the info needed to release later, but
        // remove the touch id from activeNotes so a re-articulation can
        // start fresh. We need the active info first, before noteOff
        // clears it.
        const key = manualIdx + ':' + note;
        const instName = MANUALS[manualIdx].instrument;
        pbSustained.set(key, { instName, note, manualIdx });
        // Tell the global noteOff layer to clean up its bookkeeping
        // (visual class, activeNotes set) but skip the actual release —
        // we hijack by temporarily clearing then re-adding the keep-alive.
        // Simpler: just don't call noteOff at all, and let our pbSustained
        // map track the held note. Drop it from activeNotes manually.
        const set = activeNotes.get(key);
        if (set) {
          set.delete(tid);
          if (set.size === 0) activeNotes.delete(key);
        }
      } else {
        noteOff(manualIdx, note, tid);
      }
    }
    function pbSetSustain(on) {
      pbSustainState.on = on;
      if (!on) {
        // Release everything that was held.
        pbSustained.forEach(({ instName, note, manualIdx }) => {
          const inst = instruments[instName];
          if (inst) inst.triggerRelease(manualIdx, note);
        });
        pbSustained.clear();
      }
    }

    // Schedule each event as a setTimeout offset from the start.
    // Using setTimeout (not Tone.Transport) keeps each clip's playback
    // independent and avoids conflicts if multiple clips play at once.
    clip.events.forEach(ev => {
      const id = setTimeout(() => {
        if (ev.type === 'on') {
          pbNoteOn(ev.manualIdx, ev.note, ev.vel);
        } else if (ev.type === 'off') {
          pbNoteOff(ev.manualIdx, ev.note);
        } else if (ev.type === 'sustain') {
          pbSetSustain(ev.vel >= 0.5);
        }
      }, ev.t);
      clipTimers[slot].push(id);
    });
    // Schedule the end-of-clip transition back to 'loaded'. Also force
    // sustain off and release any still-held notes from this playback.
    const endId = setTimeout(() => {
      pbSetSustain(false);
      setClipState(slot, 'loaded');
      clipTimers[slot] = [];
    }, clip.duration + 50);
    clipTimers[slot].push(endId);
    // Stash the playback's sustained-notes map onto the slot so
    // stopPlayback can release them if the user stops mid-clip.
    clipTimers[slot]._pbSustained = pbSustained;
  }

  function stopPlayback(slot) {
    clipTimers[slot].forEach(id => clearTimeout(id));
    // Release any playback-sustained notes still held.
    if (clipTimers[slot]._pbSustained) {
      clipTimers[slot]._pbSustained.forEach(({ instName, note, manualIdx }) => {
        const inst = instruments[instName];
        if (inst) inst.triggerRelease(manualIdx, note);
      });
    }
    clipTimers[slot] = [];
    // Release any notes from this clip that are currently sounding
    // (they'd otherwise hang since we're cancelling their scheduled noteOff).
    const clip = clips[slot];
    if (clip) {
      // Find notes that had an 'on' but no matching 'off' yet. Simplest:
      // release all notes whose touch id matches this slot's playback ids.
      for (const [key, set] of activeNotes) {
        for (const tid of set) {
          if (typeof tid === 'string' && tid.startsWith('pb-' + slot + '-')) {
            const [mIdxStr, note] = key.split(':');
            noteOff(parseInt(mIdxStr, 10), note, tid);
          }
        }
      }
    }
    setClipState(slot, 'loaded');
  }

  function eraseClip(slot) {
    if (activeRecordingSlot === slot) {
      activeRecordingSlot = -1;
    }
    stopPlayback(slot);  // safe even if not playing
    clips[slot] = null;
    clipTimers[slot] = [];
    setClipState(slot, 'empty');
    saveClips();
  }

  function clipAction(slot) {
    const state = clipState[slot];
    if (state === 'empty') startRecording(slot);
    else if (state === 'recording') stopRecording();
    else if (state === 'loaded') playClip(slot);
    else if (state === 'playing') stopPlayback(slot);
  }

  function attachClipHandlers(btn, slot) {
    // Tap to cycle state; long-press on a loaded/playing clip opens the
    // export/delete dialog. The button lives in the device root (not
    // inside a keyboard), so no preventDefault conflicts.
    let pressTimer = null;
    let longPressed = false;

    function startPress() {
      longPressed = false;
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        longPressed = true;
        // Only show dialog if there's something to act on. Empty slots
        // can't be exported or deleted; recording state shouldn't open
        // the dialog (user just stops recording with another tap).
        const state = clipState[slot];
        if (state === 'loaded' || state === 'playing') {
          openClipDialog(slot);
        }
      }, LONG_PRESS_MS);
    }
    function endPress() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (!longPressed) clipAction(slot);
    }
    function cancelPress() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    }

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startPress();
    }, { passive: false });
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      endPress();
    }, { passive: false });
    btn.addEventListener('touchcancel', cancelPress, { passive: false });
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      startPress();
    });
    btn.addEventListener('mouseup', endPress);
    btn.addEventListener('mouseleave', cancelPress);
  }

  // === Chord pads ===
  // Four circular buttons that each remember a single chord. Workflow:
  //   empty  -> tap -> armed (red, waiting)
  //   armed  -> play any chord on the keys -> first cluster of notes
  //             within CHORD_CAPTURE_MS gets snapshot'd -> loaded
  //   loaded -> tap -> playing (notes sound, then return to loaded)
  //   loaded -> long-press -> dialog (export/delete)
  //
  // A "chord" here = the set of distinct (manualIdx, note, vel) triples
  // played within CHORD_CAPTURE_MS of the first key-down after arming.
  // We capture velocities so playback feels like the original strike.
  // Octave-aware analysis turns the pitches into a chord symbol for
  // the label; raw pitches are what we replay, so weird voicings still
  // sound exactly as input.
  const NUM_CHORDS = 4;
  const CHORD_CAPTURE_MS = 500;     // window after first note-on. Wide
                                    // enough that a deliberate strum or
                                    // staggered chord still lands as one
                                    // capture, but short enough that two
                                    // separate chords played in quick
                                    // succession don't accidentally merge.
  const CHORD_PLAY_MS = 900;        // how long a triggered chord rings
  const chords = new Array(NUM_CHORDS).fill(null);  // {notes:[{manualIdx,note,vel}], symbol} or null
  const chordState = new Array(NUM_CHORDS).fill('empty');
  let armedChordSlot = -1;
  let chordCaptureStart = 0;
  let chordCaptureBuffer = [];      // notes seen so far in the window
  let chordCaptureTimer = null;
  // Active playback bookkeeping per slot — the touchIds we used so we
  // can release if the user taps again or stops.
  const chordPlayTimers = new Array(NUM_CHORDS).fill(null);
  const chordPlayTouchIds = new Array(NUM_CHORDS).fill(null).map(() => []);

  function setChordState(slot, state) {
    chordState[slot] = state;
    const btn = document.querySelector(`.chord-btn[data-chord-slot="${slot}"]`);
    if (!btn) return;
    btn.classList.remove('armed', 'loaded', 'playing');
    if (state !== 'empty') btn.classList.add(state);
    // Label: empty shows the slot number; otherwise the chord symbol.
    if (state === 'empty') {
      btn.textContent = String(slot + 1);
    } else if (state === 'armed') {
      btn.textContent = '●';  // simple armed glyph
    } else {
      const c = chords[slot];
      btn.textContent = c ? c.symbol : String(slot + 1);
    }
  }

  // === Chord recognizer ===
  // Convert a list of pitch names (with octaves) to a chord symbol.
  // Strategy: extract pitch classes (0-11), look at intervals from
  // each candidate root, match against templates for common qualities.
  // Octave info is preserved separately so we can detect inversions
  // (slash chords) — the lowest sounding note is the bass.
  const PITCH_CLASS = { C:0, 'C#':1, Db:1, D:2, 'D#':3, Eb:3, E:4, F:5,
    'F#':6, Gb:6, G:7, 'G#':8, Ab:8, A:9, 'A#':10, Bb:10, B:11 };
  const PC_NAMES_SHARP = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
  // Use flats when the natural reading is flatter (e.g. Eb minor reads
  // better than D♯ minor for most chords). Simple heuristic: prefer
  // sharps for sharp keys, flats for flat keys. Good enough.
  const PC_NAMES_FLAT = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

  function noteToPitchClass(noteName) {
    // noteName like "C#4" or "Bb3" — strip octave digits (and minus sign)
    const m = noteName.match(/^([A-G])(#|b)?(-?\d+)$/);
    if (!m) return null;
    const key = m[1] + (m[2] || '');
    return { pc: PITCH_CLASS[key], oct: parseInt(m[3], 10) };
  }

  function midiNumber(noteName) {
    const p = noteToPitchClass(noteName);
    if (!p) return 0;
    return (p.oct + 1) * 12 + p.pc;
  }

  // Each template is a sorted list of intervals from the root, plus the
  // suffix to append after the root. Order matters: more specific (more
  // notes) before less specific so we match maj7 before maj.
  // Scope: triads (major, minor, augmented, diminished) and the three
  // common 7th chords (dom7, maj7, m7). Anything else falls through to
  // note-list output.
  const CHORD_TEMPLATES = [
    // Tetrads
    { iv: [0,4,7,11], sfx: 'maj7' },
    { iv: [0,4,7,10], sfx: '7'    },
    { iv: [0,3,7,10], sfx: 'm7'   },
    // Triads
    { iv: [0,4,7],    sfx: ''     },  // major
    { iv: [0,3,7],    sfx: 'm'    },
    { iv: [0,3,6],    sfx: 'dim'  },
    { iv: [0,4,8],    sfx: 'aug'  },
  ];

  // Render a list of pitches as space-separated note names, low to high,
  // de-duplicated by pitch class. Used as the fallback whenever the input
  // doesn't match a template.
  function noteListSymbol(parsed) {
    const sorted = [...parsed].sort((a,b) => a.midi - b.midi);
    const seen = new Set();
    const labels = [];
    for (const p of sorted) {
      if (!seen.has(p.pc)) {
        seen.add(p.pc);
        labels.push(PC_NAMES_SHARP[p.pc]);
      }
    }
    return labels.join(' ');
  }

  // Try to match a sorted-unique pitch-class set to a template under
  // any rotation (i.e. trying each note as the candidate root).
  function recognizeChord(notes) {
    if (!notes || notes.length === 0) return null;
    const parsed = notes.map(n => ({ ...noteToPitchClass(n.note), midi: midiNumber(n.note) }))
                        .filter(p => p.pc !== undefined && p.pc !== null);
    if (parsed.length === 0) return null;

    // Single note — just the note name
    if (parsed.length === 1) {
      return { symbol: PC_NAMES_SHARP[parsed[0].pc], bass: parsed[0].midi };
    }

    const bassMidi = parsed.reduce((min, p) => p.midi < min ? p.midi : min, Infinity);
    const bassPc = ((bassMidi % 12) + 12) % 12;

    // Distinct pitch classes
    const pcs = Array.from(new Set(parsed.map(p => p.pc))).sort((a,b) => a - b);

    // Two distinct pcs → no triad/7th can match → fall through to notes
    if (pcs.length < 3) {
      return { symbol: noteListSymbol(parsed), bass: bassMidi };
    }

    // 3+ distinct pcs → try templates from most specific down. Match
    // only when bass = root (we don't render slash chords any more, so
    // any non-root-position spelling falls through to the note list).
    let bestMatch = null;
    for (const tpl of CHORD_TEMPLATES) {
      if (tpl.iv.length !== pcs.length) continue;
      const intervals = pcs.map(pc => (pc - bassPc + 12) % 12).sort((a,b) => a - b);
      const expected = [...tpl.iv].sort((a,b) => a - b);
      if (intervals.length === expected.length &&
          intervals.every((v, i) => v === expected[i])) {
        bestMatch = { rootPc: bassPc, tpl };
        break;
      }
    }

    if (bestMatch) {
      const rootName = PC_NAMES_SHARP[bestMatch.rootPc];
      return { symbol: rootName + bestMatch.tpl.sfx, bass: bassMidi };
    }

    // Anything else — list the notes
    return { symbol: noteListSymbol(parsed), bass: bassMidi };
  }

  // === Chord persistence ===
  const CHORD_STORAGE_KEY = 'keyboard.chords.v1';
  function saveChords() {
    try {
      localStorage.setItem(CHORD_STORAGE_KEY, JSON.stringify(chords));
    } catch (e) { /* same as clips: best-effort */ }
  }
  function loadChords() {
    try {
      const raw = localStorage.getItem(CHORD_STORAGE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return;
      for (let i = 0; i < NUM_CHORDS; i++) {
        const c = parsed[i];
        if (c && Array.isArray(c.notes) && typeof c.symbol === 'string') {
          chords[i] = c;
          setChordState(i, 'loaded');
        }
      }
    } catch (e) { /* ignore */ }
  }

  // === Capture flow ===
  function armChord(slot) {
    // Disarm any other slot first
    if (armedChordSlot >= 0 && armedChordSlot !== slot) {
      setChordState(armedChordSlot, chords[armedChordSlot] ? 'loaded' : 'empty');
    }
    armedChordSlot = slot;
    chordCaptureBuffer = [];
    chordCaptureStart = 0;
    if (chordCaptureTimer) { clearTimeout(chordCaptureTimer); chordCaptureTimer = null; }
    setChordState(slot, 'armed');
  }

  function disarmChord() {
    if (armedChordSlot < 0) return;
    const slot = armedChordSlot;
    armedChordSlot = -1;
    chordCaptureBuffer = [];
    if (chordCaptureTimer) { clearTimeout(chordCaptureTimer); chordCaptureTimer = null; }
    // Restore label/state based on whether anything is stored
    setChordState(slot, chords[slot] ? 'loaded' : 'empty');
  }

  // Called from noteOn while a slot is armed. Buffers notes within
  // CHORD_CAPTURE_MS of the first one, then finalizes.
  function chordCaptureNote(manualIdx, note, vel) {
    if (armedChordSlot < 0) return;
    const now = nowMs();
    if (chordCaptureBuffer.length === 0) {
      chordCaptureStart = now;
      // Finalize after the window expires
      chordCaptureTimer = setTimeout(finalizeCapturedChord, CHORD_CAPTURE_MS);
    } else if (now - chordCaptureStart > CHORD_CAPTURE_MS) {
      // Late note — ignore, the timer will close out the buffer
      return;
    }
    // Avoid duplicate (manualIdx, note) pairs in case of fast retriggers
    const dupe = chordCaptureBuffer.some(n => n.manualIdx === manualIdx && n.note === note);
    if (!dupe) {
      chordCaptureBuffer.push({ manualIdx, note, vel });
    }
  }

  function finalizeCapturedChord() {
    if (armedChordSlot < 0) return;
    const slot = armedChordSlot;
    const buf = chordCaptureBuffer;
    armedChordSlot = -1;
    chordCaptureBuffer = [];
    chordCaptureTimer = null;
    if (buf.length === 0) {
      // Nothing played — revert to whatever state the slot had before
      setChordState(slot, chords[slot] ? 'loaded' : 'empty');
      return;
    }
    // Reject single-note captures (one distinct pitch class, even if
    // doubled at multiple octaves). Chord pads are for chords; a single
    // note is almost always an accidental tap on the wrong target.
    // Revert state and discard the buffer.
    const distinctPcs = new Set();
    for (const n of buf) {
      const p = noteToPitchClass(n.note);
      if (p) distinctPcs.add(p.pc);
    }
    if (distinctPcs.size < 2) {
      setChordState(slot, chords[slot] ? 'loaded' : 'empty');
      return;
    }
    const recognized = recognizeChord(buf);
    chords[slot] = {
      notes: buf,
      symbol: recognized ? recognized.symbol : '?',
    };
    setChordState(slot, 'loaded');
    saveChords();
  }

  // === Playback ===
  // Start playing the chord and keep it ringing — caller is responsible
  // for calling stopChordHold() when the user lifts. No auto-release
  // timer; the chord sustains as long as the press is held.
  function startChordHold(slot) {
    const c = chords[slot];
    if (!c || !c.notes.length) return;
    // Defensive cleanup in case anything is lingering from a previous
    // (timed) play session.
    stopChord(slot);
    setChordState(slot, 'playing');
    const tids = [];
    c.notes.forEach((n, i) => {
      const tid = 'cd-' + slot + '-' + i;
      tids.push(tid);
      noteOn(n.manualIdx, n.note, tid, n.vel);
    });
    chordPlayTouchIds[slot] = tids;
  }

  // Release a held chord on lift. Notes-off + state back to loaded.
  function stopChordHold(slot) {
    releaseChord(slot);
    setChordState(slot, 'loaded');
  }

  // Legacy timed playback — kept for backward compatibility with code
  // paths that might still call it (e.g. dialog cleanup), but the
  // primary playback path is hold-driven via startChordHold.
  function playChord(slot) {
    const c = chords[slot];
    if (!c || !c.notes.length) return;
    stopChord(slot);
    setChordState(slot, 'playing');
    const tids = [];
    c.notes.forEach((n, i) => {
      const tid = 'cd-' + slot + '-' + i;
      tids.push(tid);
      noteOn(n.manualIdx, n.note, tid, n.vel);
    });
    chordPlayTouchIds[slot] = tids;
    chordPlayTimers[slot] = setTimeout(() => {
      releaseChord(slot);
      setChordState(slot, 'loaded');
      chordPlayTimers[slot] = null;
    }, CHORD_PLAY_MS);
  }

  function releaseChord(slot) {
    const tids = chordPlayTouchIds[slot];
    const c = chords[slot];
    if (!tids || !c) return;
    c.notes.forEach((n, i) => {
      const tid = 'cd-' + slot + '-' + i;
      noteOff(n.manualIdx, n.note, tid);
    });
    chordPlayTouchIds[slot] = [];
  }

  function stopChord(slot) {
    if (chordPlayTimers[slot]) {
      clearTimeout(chordPlayTimers[slot]);
      chordPlayTimers[slot] = null;
    }
    releaseChord(slot);
  }

  function eraseChord(slot) {
    if (armedChordSlot === slot) {
      armedChordSlot = -1;
      chordCaptureBuffer = [];
      if (chordCaptureTimer) { clearTimeout(chordCaptureTimer); chordCaptureTimer = null; }
    }
    stopChord(slot);
    chords[slot] = null;
    setChordState(slot, 'empty');
    saveChords();
  }

  // === Chord MIDI export ===
  // Reuse the file builder from clips by faking a one-event-cluster
  // "clip" — all notes-on at t=0, all notes-off at t=CHORD_PLAY_MS.
  // Sustain events skipped (chords don't capture pedal state).
  function exportChordAsMidi(slot) {
    const c = chords[slot];
    if (!c || !c.notes.length) return;
    const events = [];
    c.notes.forEach(n => events.push({ t: 0, type: 'on', manualIdx: n.manualIdx, note: n.note, vel: n.vel }));
    c.notes.forEach(n => events.push({ t: CHORD_PLAY_MS, type: 'off', manualIdx: n.manualIdx, note: n.note, vel: 0 }));
    const fakeClip = { events, duration: CHORD_PLAY_MS };
    const bytes = buildMidiFile(fakeClip);
    const blob = new Blob([bytes], { type: 'audio/midi' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `chord-${slot + 1}-${c.symbol.replace(/[^A-Za-z0-9]/g, '_')}.mid`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // Gesture model for chord pads:
  //   empty     → tap → arm (capture mode)
  //   armed     → tap → disarm (cancel)
  //   loaded    → press-and-hold → play while held, release on lift
  //   loaded    → double-tap → open export/delete dialog
  // Single-tap on a loaded pad still plays — it's a very short hold.
  // Long-press is no longer used (it would conflict with sustained
  // playback). Double-tap is detected by a second press-down arriving
  // within DOUBLE_TAP_WINDOW_MS of the previous release.
  const CHORD_DOUBLE_TAP_MS = 350;
  const chordLastReleaseAt = new Array(NUM_CHORDS).fill(0);
  // Track which slot each touch identifier is currently holding, so we
  // release the right slot on touchend/touchcancel and so the same finger
  // can't double-trigger.
  const chordHoldByTouch = new Map();
  // For mouse: a single 'mouse' identifier suffices.
  let chordHoldByMouse = -1;

  function attachChordHandlers(btn, slot) {
    // Press-down logic, shared by mouse and touch. Returns true if the
    // press should be tracked as "holding the chord", false if it was
    // consumed by another action (arming, double-tap, etc.).
    function press(touchIdent) {
      const state = chordState[slot];
      if (state === 'empty') {
        armChord(slot);
        return false;
      }
      if (state === 'armed') {
        disarmChord();
        return false;
      }
      // loaded or playing → check for double-tap
      const now = nowMs();
      if (now - chordLastReleaseAt[slot] < CHORD_DOUBLE_TAP_MS) {
        // Double-tap: stop any in-progress playback and open the dialog.
        // Reset the timestamp so a third quick tap doesn't open it again.
        chordLastReleaseAt[slot] = 0;
        stopChord(slot);
        setChordState(slot, 'loaded');
        openChordDialog(slot);
        return false;
      }
      // Single press → start playing held. If something else is already
      // holding this slot (e.g. multitouch second finger), ignore — one
      // hold per slot at a time.
      if (chordHoldByMouse === slot) return false;
      for (const v of chordHoldByTouch.values()) if (v === slot) return false;
      startChordHold(slot);
      return true;
    }

    function release(touchIdent) {
      // Only release if we're actually holding this slot for this touch.
      // The chordLastReleaseAt timestamp is set whenever a hold ends so
      // a subsequent press can detect a double-tap.
      if (chordState[slot] === 'playing') {
        stopChordHold(slot);
        chordLastReleaseAt[slot] = nowMs();
      }
    }

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      // Use the first changedTouch — secondary touches on the same pad
      // are ignored (single-finger hold semantics).
      const t = e.changedTouches[0];
      if (!t) return;
      // Only track this touch if it actually starts a hold; otherwise
      // the press was consumed (arm/disarm/double-tap) and we don't
      // need a touchend handler for it.
      if (press(t.identifier)) {
        chordHoldByTouch.set(t.identifier, slot);
      }
    }, { passive: false });

    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (chordHoldByTouch.get(t.identifier) === slot) {
          chordHoldByTouch.delete(t.identifier);
          release(t.identifier);
        }
      }
    }, { passive: false });

    btn.addEventListener('touchcancel', (e) => {
      for (const t of e.changedTouches) {
        if (chordHoldByTouch.get(t.identifier) === slot) {
          chordHoldByTouch.delete(t.identifier);
          release(t.identifier);
        }
      }
    }, { passive: false });

    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      if (press('mouse')) {
        chordHoldByMouse = slot;
      }
    });
    // mouseup/mouseleave are handled at the window level (below) so
    // the chord releases even if the cursor leaves the button while held.
  }

  // Window-level mouse release for chord pads — mirrors the keyboard's
  // window-level mouseup handler. Without this, sliding off a pad while
  // holding leaves the chord stuck on.
  window.addEventListener('mouseup', () => {
    if (chordHoldByMouse >= 0) {
      const slot = chordHoldByMouse;
      chordHoldByMouse = -1;
      if (chordState[slot] === 'playing') {
        stopChordHold(slot);
        chordLastReleaseAt[slot] = nowMs();
      }
    }
  });
  // Releasing focus (alt-tab, etc.) while held — cleanest to release
  // all held chords so we don't leave notes ringing.
  window.addEventListener('blur', () => {
    if (chordHoldByMouse >= 0) {
      const slot = chordHoldByMouse;
      chordHoldByMouse = -1;
      if (chordState[slot] === 'playing') stopChordHold(slot);
    }
    for (const slot of chordHoldByTouch.values()) {
      if (chordState[slot] === 'playing') stopChordHold(slot);
    }
    chordHoldByTouch.clear();
  });

  // Reuse the clip-dialog visuals for chord export/delete by parameterizing
  // the active slot type. Simplest approach: a separate dialog instance
  // pointed at chord actions. (Extending the clip dialog would tangle
  // its slot semantics; cleaner to mirror it.)
  let chordDialogEl = null;
  let chordDialogActiveSlot = -1;

  function buildChordDialog() {
    const overlay = document.createElement('div');
    overlay.className = 'clip-dialog-overlay';
    const dialog = document.createElement('div');
    dialog.className = 'clip-dialog';
    const title = document.createElement('div');
    title.className = 'clip-dialog-title';
    const actions = document.createElement('div');
    actions.className = 'clip-dialog-actions';
    const exportBtn = document.createElement('button');
    exportBtn.className = 'clip-dialog-btn';
    exportBtn.textContent = 'EXPORT MIDI';
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'clip-dialog-btn danger';
    deleteBtn.textContent = 'DELETE';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'clip-dialog-cancel';
    cancelBtn.textContent = 'CANCEL';
    actions.appendChild(exportBtn);
    actions.appendChild(deleteBtn);
    dialog.appendChild(title);
    dialog.appendChild(actions);
    dialog.appendChild(cancelBtn);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeChordDialog();
    });
    dialog.addEventListener('click', (e) => e.stopPropagation());
    exportBtn.addEventListener('click', () => {
      if (chordDialogActiveSlot >= 0) exportChordAsMidi(chordDialogActiveSlot);
      closeChordDialog();
    });
    deleteBtn.addEventListener('click', () => {
      if (chordDialogActiveSlot >= 0) eraseChord(chordDialogActiveSlot);
      closeChordDialog();
    });
    cancelBtn.addEventListener('click', closeChordDialog);
    return { overlay, title };
  }
  function openChordDialog(slot) {
    if (!chordDialogEl) chordDialogEl = buildChordDialog();
    chordDialogActiveSlot = slot;
    const c = chords[slot];
    chordDialogEl.title.textContent = c ? `CHORD ${slot + 1}  ${c.symbol}` : `CHORD ${slot + 1}`;
    chordDialogEl.overlay.classList.add('open');
  }
  function closeChordDialog() {
    if (!chordDialogEl) return;
    chordDialogEl.overlay.classList.remove('open');
    chordDialogActiveSlot = -1;
  }

  // === Clip dialog ===
  // Built lazily on first open. Reused for all slots — slot context is
  // captured in the action handlers each time the dialog opens.
  let clipDialogEl = null;
  let clipDialogActiveSlot = -1;

  function buildClipDialog() {
    const overlay = document.createElement('div');
    overlay.className = 'clip-dialog-overlay';
    const dialog = document.createElement('div');
    dialog.className = 'clip-dialog';
    const title = document.createElement('div');
    title.className = 'clip-dialog-title';
    title.textContent = 'CLIP';
    const actions = document.createElement('div');
    actions.className = 'clip-dialog-actions';
    const exportBtn = document.createElement('button');
    exportBtn.className = 'clip-dialog-btn';
    exportBtn.textContent = 'EXPORT MIDI';
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'clip-dialog-btn danger';
    deleteBtn.textContent = 'DELETE';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'clip-dialog-cancel';
    cancelBtn.textContent = 'CANCEL';

    actions.appendChild(exportBtn);
    actions.appendChild(deleteBtn);
    dialog.appendChild(title);
    dialog.appendChild(actions);
    dialog.appendChild(cancelBtn);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);

    // Tapping outside the dialog (on the overlay) cancels.
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeClipDialog();
    });
    // Don't let clicks inside the dialog box itself bubble to the
    // overlay (which would close it).
    dialog.addEventListener('click', (e) => e.stopPropagation());

    exportBtn.addEventListener('click', () => {
      if (clipDialogActiveSlot >= 0) exportClipAsMidi(clipDialogActiveSlot);
      closeClipDialog();
    });
    deleteBtn.addEventListener('click', () => {
      if (clipDialogActiveSlot >= 0) eraseClip(clipDialogActiveSlot);
      closeClipDialog();
    });
    cancelBtn.addEventListener('click', closeClipDialog);

    return { overlay, title };
  }

  function openClipDialog(slot) {
    if (!clipDialogEl) clipDialogEl = buildClipDialog();
    clipDialogActiveSlot = slot;
    clipDialogEl.title.textContent = `CLIP ${slot + 1}`;
    clipDialogEl.overlay.classList.add('open');
  }

  function closeClipDialog() {
    if (!clipDialogEl) return;
    clipDialogEl.overlay.classList.remove('open');
    clipDialogActiveSlot = -1;
  }

  // === MIDI file export ===
  // Constructs a Standard MIDI File (SMF) Type 1 from a clip's events.
  // Two tracks: one per manual, on channels 1 and 2. Variable-length
  // delta times computed from the captured millisecond timestamps.
  // Tempo: 120 BPM, resolution: 480 ticks per quarter note. So 1 tick
  // = 60000 / (120 * 480) ≈ 1.04 ms — fine resolution for our purposes.
  function noteNameToMidi(name) {
    // e.g. "C4" → 60, "C#4" → 61, "Bb3" → 58
    const match = name.match(/^([A-G])(#|b)?(-?\d+)$/);
    if (!match) return 60;
    const [, letter, accidental, octStr] = match;
    const baseSemitones = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    let n = baseSemitones[letter];
    if (accidental === '#') n += 1;
    else if (accidental === 'b') n -= 1;
    n += (parseInt(octStr, 10) + 1) * 12;
    return Math.max(0, Math.min(127, n));
  }

  function vlq(value) {
    // Variable-length quantity encoding for MIDI delta times.
    // Each byte uses 7 bits of the value; high bit set = "more bytes follow".
    if (value < 0) value = 0;
    const bytes = [value & 0x7f];
    value >>>= 7;
    while (value > 0) {
      bytes.unshift((value & 0x7f) | 0x80);
      value >>>= 7;
    }
    return bytes;
  }

  function buildMidiFile(clip) {
    const TICKS_PER_QUARTER = 480;
    const BPM = 120;
    const MS_PER_TICK = 60000 / (BPM * TICKS_PER_QUARTER);  // ~1.04 ms

    // Sort events into per-manual buckets so each goes on its own track
    // and channel. Sustain events (manualIdx = -1) are global — duplicate
    // them onto BOTH tracks so each channel applies sustain to its own
    // notes correctly when imported into a DAW.
    const tracks = [[], []];
    const sustainEvents = [];
    clip.events.forEach(ev => {
      if (ev.type === 'sustain') {
        sustainEvents.push(ev);
      } else {
        tracks[ev.manualIdx].push(ev);
      }
    });
    // Mirror sustain events onto both tracks
    sustainEvents.forEach(ev => {
      tracks[0].push(ev);
      tracks[1].push(ev);
    });
    tracks.forEach(t => t.sort((a, b) => a.t - b.t));

    function buildTrackChunk(events, channel) {
      const data = [];
      let lastTick = 0;
      events.forEach(ev => {
        const tick = Math.round(ev.t / MS_PER_TICK);
        const delta = tick - lastTick;
        lastTick = tick;
        data.push(...vlq(delta));
        if (ev.type === 'sustain') {
          // Control Change: status 0xB0 | channel, controller 64 (sustain),
          // value 0 (off) or 127 (on).
          const status = 0xb0 | (channel & 0x0f);
          const value = ev.vel >= 0.5 ? 127 : 0;
          data.push(status, 64, value);
        } else {
          const status = (ev.type === 'on' ? 0x90 : 0x80) | (channel & 0x0f);
          const noteNum = noteNameToMidi(ev.note);
          const vel = ev.type === 'on'
            ? Math.max(1, Math.min(127, Math.round((ev.vel || 0.78) * 127)))
            : 0;
          data.push(status, noteNum, vel);
        }
      });
      // End-of-track meta event
      data.push(0x00, 0xff, 0x2f, 0x00);

      // Wrap in MTrk chunk: 4 bytes "MTrk" + 4 bytes length + data
      const chunk = [0x4d, 0x54, 0x72, 0x6b];
      const len = data.length;
      chunk.push((len >> 24) & 0xff, (len >> 16) & 0xff, (len >> 8) & 0xff, len & 0xff);
      chunk.push(...data);
      return chunk;
    }

    // Header chunk (MThd): format 1, 2 tracks, ticks-per-quarter division
    const header = [
      0x4d, 0x54, 0x68, 0x64,  // "MThd"
      0x00, 0x00, 0x00, 0x06,  // chunk length = 6
      0x00, 0x01,              // format = 1 (multi-track)
      0x00, 0x02,              // ntrks = 2
      (TICKS_PER_QUARTER >> 8) & 0xff, TICKS_PER_QUARTER & 0xff,
    ];

    const track0 = buildTrackChunk(tracks[0], 0);  // top manual on channel 1
    const track1 = buildTrackChunk(tracks[1], 1);  // bottom manual on channel 2
    return new Uint8Array([...header, ...track0, ...track1]);
  }

  function exportClipAsMidi(slot) {
    const clip = clips[slot];
    if (!clip || !clip.events || clip.events.length === 0) return;
    const bytes = buildMidiFile(clip);
    const blob = new Blob([bytes], { type: 'audio/midi' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clip-${slot + 1}.mid`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function attachSustainHandlers(bar) {
    bar.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const wasDouble = tryDoubleTapLock(bar);
      for (const t of e.changedTouches) sustainInputs.add(t.identifier);
      if (!wasDouble) setSustain(true);
    }, { passive: false });

    function endTouch(e) {
      e.preventDefault();
      for (const t of e.changedTouches) sustainInputs.delete(t.identifier);
      if (!sustainLocked) setSustain(sustainInputs.size > 0);
    }
    bar.addEventListener('touchend', endTouch, { passive: false });
    bar.addEventListener('touchcancel', endTouch, { passive: false });

    bar.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const wasDouble = tryDoubleTapLock(bar);
      sustainInputs.add('mouse');
      if (!wasDouble) setSustain(true);
    });
  }

  // Mouseup releases sustain if the mouse was the engager. Window-level
  // because the cursor may have moved off the bar before release.
  window.addEventListener('mouseup', () => {
    if (sustainInputs.has('mouse')) {
      sustainInputs.delete('mouse');
      if (!sustainLocked) setSustain(sustainInputs.size > 0);
    }
  });

  let mouseDown = false, mouseHit = null;
  window.addEventListener('mouseup', () => {
    mouseDown = false;
    if (mouseHit) { noteOff(mouseHit.manualIdx, mouseHit.note, 'mouse'); mouseHit = null; }
  });

  // === Computer keyboard for desktop testing ===
  // Bottom row of letters → bottom manual (bass, C2-C4)
  // Top row of letters → top manual (treble, C4-C6)
  const KEY_MAP = {
    // bottom manual (octaveStart = MANUALS[1].octaveStart = 2)
    'z':{m:1,n:'C'}, 's':{m:1,n:'C#'}, 'x':{m:1,n:'D'}, 'd':{m:1,n:'D#'},
    'c':{m:1,n:'E'}, 'v':{m:1,n:'F'}, 'g':{m:1,n:'F#'}, 'b':{m:1,n:'G'},
    'h':{m:1,n:'G#'}, 'n':{m:1,n:'A'}, 'j':{m:1,n:'A#'}, 'm':{m:1,n:'B'},
    // top manual (octaveStart = MANUALS[0].octaveStart = 4)
    'q':{m:0,n:'C'}, '2':{m:0,n:'C#'}, 'w':{m:0,n:'D'}, '3':{m:0,n:'D#'},
    'e':{m:0,n:'E'}, 'r':{m:0,n:'F'}, '5':{m:0,n:'F#'}, 't':{m:0,n:'G'},
    '6':{m:0,n:'G#'}, 'y':{m:0,n:'A'}, '7':{m:0,n:'A#'}, 'u':{m:0,n:'B'},
    'i':{m:0,n:'C',o:1},
  };
  const pressed = new Set();
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (pressed.has(k) || !KEY_MAP[k]) return;
    pressed.add(k);
    const map = KEY_MAP[k];
    const note = map.n + (MANUALS[map.m].octaveStart + (map.o || 0));
    noteOn(map.m, note, 'kb-' + k);
  });
  window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (!pressed.has(k)) return;
    pressed.delete(k);
    const map = KEY_MAP[k];
    if (!map) return;
    const note = map.n + (MANUALS[map.m].octaveStart + (map.o || 0));
    noteOff(map.m, note, 'kb-' + k);
  });

  // Prevent iOS double-tap zoom
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  // Start the AudioContext on the very first user interaction — anywhere
  // on the page, not just on a key — so the first note doesn't pay the
  // startup cost. iOS requires a user gesture to unlock audio; touchstart
  // and mousedown both qualify.
  function unlockAudio() {
    if (audioStarted) return;
    audioStarted = true;
    Tone.start();
    document.removeEventListener('touchstart', unlockAudio, true);
    document.removeEventListener('mousedown', unlockAudio, true);
    document.removeEventListener('keydown', unlockAudio, true);
  }
  document.addEventListener('touchstart', unlockAudio, true);
  document.addEventListener('mousedown', unlockAudio, true);
  document.addEventListener('keydown', unlockAudio, true);

  // Init
  buildAllManuals();
  initInstruments();
  // Hydrate clips after the buttons exist so setClipState can light
  // up the loaded slots.
  loadClips();
  loadChords();
</script>

</body>
</html>
